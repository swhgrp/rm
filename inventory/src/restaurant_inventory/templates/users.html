{% extends "base.html" %}

{% block title %}User Management - Restaurant Inventory{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h1><i class="bi bi-people"></i> User Management</h1>
    <button class="btn btn-primary" onclick="showCreateUserModal()">
        <i class="bi bi-plus-circle"></i> Add User
    </button>
</div>

<!-- Users Table -->
<div class="card">
    <div class="card-body">
        <table class="table table-hover">
            <thead class="table-dark">
                <tr>
                    <th>ID</th>
                    <th>Username</th>
                    <th>Email</th>
                    <th>Full Name</th>
                    <th>Role</th>
                    <th>Status</th>
                    <th>Last Login</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="usersTableBody">
                <tr>
                    <td colspan="8" class="text-center">
                        <div class="spinner-border" role="status">
                            <span class="visually-hidden">Loading...</span>
                        </div>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</div>

<!-- Create/Edit User Modal -->
<div class="modal fade" id="userModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="userModalTitle">Add New User</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <form id="userForm">
                    <div class="mb-3">
                        <label for="username" class="form-label">Username *</label>
                        <input type="text" class="form-control" id="username" required>
                    </div>
                    <div class="mb-3">
                        <label for="email" class="form-label">Email *</label>
                        <input type="email" class="form-control" id="email" required>
                    </div>
                    <div class="mb-3">
                        <label for="fullName" class="form-label">Full Name *</label>
                        <input type="text" class="form-control" id="fullName" required>
                    </div>
                    <div class="mb-3">
                        <label for="password" class="form-label">Password *</label>
                        <input type="password" class="form-control" id="password" required>
                    </div>
                    <div class="mb-3">
                        <label for="role" class="form-label">Role *</label>
                        <select class="form-select" id="role" required>
                            <option value="">Select role...</option>
                            <option value="STAFF">Staff</option>
                            <option value="MANAGER">Manager</option>
                            <option value="ADMIN">Admin</option>
                        </select>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                <button type="button" class="btn btn-primary" onclick="saveUser()">Save User</button>
            </div>
        </div>
    </div>
</div>

<script>
    let users = [];
    let userModal;

    // Check admin access on page load
    async function checkAdminAccess() {
        const userData = localStorage.getItem('user');
        if (!userData) {
            window.location.href = '/login';
            return false;
        }

        const user = JSON.parse(userData);
        if (user.role !== 'ADMIN') {
            showAlert('Access denied. Admin privileges required.', 'danger');
            setTimeout(() => {
                window.location.href = '/dashboard';
            }, 2000);
            return false;
        }
        return true;
    }

    // Initialize on page load
    document.addEventListener('DOMContentLoaded', async function() {
        const hasAccess = await checkAdminAccess();
        if (!hasAccess) return;

        userModal = new bootstrap.Modal(document.getElementById('userModal'));
        await loadUsers();
    });

    // API helper function
    async function apiRequest(url, options = {}) {
        const token = localStorage.getItem('access_token');
        const defaultOptions = {
            headers: {
                'Authorization': `Bearer ${token}`,
                'Content-Type': 'application/json'
            }
        };

        const response = await fetch(url, { ...defaultOptions, ...options });

        if (response.status === 401) {
            localStorage.clear();
            window.location.href = '/login';
            throw new Error('Unauthorized');
        }

        if (!response.ok) {
            const error = await response.json();
            throw new Error(error.detail || 'Request failed');
        }

        return response.json();
    }

    // Load all users
    async function loadUsers() {
        try {
            users = await apiRequest('api/users/');
            displayUsers();
        } catch (error) {
            console.error('Error loading users:', error);
            showAlert('Error loading users: ' + error.message, 'danger');
        }
    }

    // Display users in table
    function displayUsers() {
        const tbody = document.getElementById('usersTableBody');

        if (users.length === 0) {
            tbody.innerHTML = '<tr><td colspan="8" class="text-center">No users found</td></tr>';
            return;
        }

        tbody.innerHTML = users.map(user => {
            const statusBadge = user.is_active
                ? '<span class="badge bg-success">Active</span>'
                : '<span class="badge bg-danger">Inactive</span>';

            const roleBadge = {
                'ADMIN': '<span class="badge bg-danger">Admin</span>',
                'MANAGER': '<span class="badge bg-warning">Manager</span>',
                'STAFF': '<span class="badge bg-info">Staff</span>'
            }[user.role] || user.role;

            const lastLogin = user.last_login
                ? new Date(user.last_login).toLocaleString()
                : 'Never';

            const currentUser = JSON.parse(localStorage.getItem('user'));
            const isSelf = currentUser.id === user.id;

            return `
                <tr>
                    <td>${user.id}</td>
                    <td>${user.username}</td>
                    <td>${user.email}</td>
                    <td>${user.full_name}</td>
                    <td>${roleBadge}</td>
                    <td>${statusBadge}</td>
                    <td>${lastLogin}</td>
                    <td>
                        ${!isSelf ? `
                            ${user.is_active ? `
                                <button class="btn btn-sm btn-warning" onclick="deactivateUser(${user.id})" title="Deactivate">
                                    <i class="bi bi-pause-circle"></i>
                                </button>
                            ` : `
                                <button class="btn btn-sm btn-success" onclick="activateUser(${user.id})" title="Activate">
                                    <i class="bi bi-play-circle"></i>
                                </button>
                            `}
                            <button class="btn btn-sm btn-danger" onclick="deleteUser(${user.id})" title="Delete">
                                <i class="bi bi-trash"></i>
                            </button>
                        ` : '<span class="text-muted">Current user</span>'}
                    </td>
                </tr>
            `;
        }).join('');
    }

    // Show create user modal
    function showCreateUserModal() {
        document.getElementById('userModalTitle').textContent = 'Add New User';
        document.getElementById('userForm').reset();
        userModal.show();
    }

    // Save user
    async function saveUser() {
        const username = document.getElementById('username').value;
        const email = document.getElementById('email').value;
        const fullName = document.getElementById('fullName').value;
        const password = document.getElementById('password').value;
        const role = document.getElementById('role').value;

        if (!username || !email || !fullName || !password || !role) {
            showAlert('Please fill in all required fields', 'warning');
            return;
        }

        try {
            await apiRequest('api/users/', {
                method: 'POST',
                body: JSON.stringify({
                    username: username,
                    email: email,
                    full_name: fullName,
                    password: password,
                    role: role
                })
            });

            userModal.hide();
            showAlert('User created successfully!', 'success');
            await loadUsers();
        } catch (error) {
            console.error('Error creating user:', error);
            showAlert('Error creating user: ' + error.message, 'danger');
        }
    }

    // Deactivate user
    async function deactivateUser(userId) {
        if (!await showConfirm('Are you sure you want to deactivate this user?')) {
            return;
        }

        try {
            await apiRequest(`api/users/${userId}/deactivate`, {
                method: 'PUT'
            });
            showAlert('User deactivated successfully!', 'success');
            await loadUsers();
        } catch (error) {
            console.error('Error deactivating user:', error);
            showAlert('Error deactivating user: ' + error.message, 'danger');
        }
    }

    // Activate user
    async function activateUser(userId) {
        try {
            await apiRequest(`api/users/${userId}/activate`, {
                method: 'PUT'
            });
            showAlert('User activated successfully!', 'success');
            await loadUsers();
        } catch (error) {
            console.error('Error activating user:', error);
            showAlert('Error activating user: ' + error.message, 'danger');
        }
    }

    // Delete user
    async function deleteUser(userId) {
        if (!await showConfirm('Are you sure you want to permanently delete this user? This action cannot be undone.')) {
            return;
        }

        try {
            await apiRequest(`api/users/${userId}`, {
                method: 'DELETE'
            });
            showAlert('User deleted successfully!', 'success');
            await loadUsers();
        } catch (error) {
            console.error('Error deleting user:', error);
            showAlert('Error deleting user: ' + error.message, 'danger');
        }
    }

    // Show alert
    function showAlert(message, type) {
        const alertDiv = document.createElement('div');
        alertDiv.className = `alert alert-${type} alert-dismissible fade show position-fixed top-0 start-50 translate-middle-x mt-3`;
        alertDiv.style.zIndex = '9999';
        alertDiv.innerHTML = `
            ${message}
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        `;
        document.body.appendChild(alertDiv);

        setTimeout(() => {
            alertDiv.remove();
        }, 5000);
    }
</script>
{% endblock %}
