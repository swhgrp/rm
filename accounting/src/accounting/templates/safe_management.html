{% extends "base.html" %}

{% block title %}Safe Management - Accounting System{% endblock %}

{% block nav_safe %}active{% endblock %}

{% block content %}
<div class="container-fluid">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2><i class="bi bi-safe"></i> Safe Management</h2>
        <button class="btn btn-primary" onclick="showAddModal()">
            <i class="bi bi-plus-circle"></i> Add Transaction
        </button>
    </div>

    <div class="row mb-4" id="balanceCards"></div>

    <div class="card">
        <div class="card-header"><h5 class="mb-0">Safe Transactions</h5></div>
        <div class="card-body">
            <div class="row g-2 mb-3">
                <div class="col-md-3">
                    <select id="filterArea" class="form-select" onchange="loadData()">
                        <option value="">All Locations</option>
                    </select>
                </div>
                <div class="col-md-2">
                    <input type="date" id="filterStart" class="form-control" onchange="loadTxns()">
                </div>
                <div class="col-md-2">
                    <input type="date" id="filterEnd" class="form-control" onchange="loadTxns()">
                </div>
                <div class="col-md-2">
                    <select id="filterType" class="form-select" onchange="loadTxns()">
                        <option value="">All Types</option>
                        <option value="deposit">Deposit</option>
                        <option value="withdrawal">Withdrawal</option>
                    </select>
                </div>
            </div>
            <table class="table">
                <thead><tr><th>Date</th><th>Location</th><th>Type</th><th>Description</th><th class="text-end">Amount</th><th>Status</th><th>Actions</th></tr></thead>
                <tbody id="txnTable"><tr><td colspan="7" class="text-center">Loading...</td></tr></tbody>
            </table>
        </div>
    </div>
</div>

<div class="modal fade" id="addModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5>Add Safe Transaction</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <div class="mb-3">
                    <label>Location *</label>
                    <select id="txnArea" class="form-select" required></select>
                </div>
                <div class="mb-3">
                    <label>Date *</label>
                    <input type="date" id="txnDate" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label>Type *</label>
                    <select id="txnType" class="form-select" required>
                        <option value="">Select</option>
                        <option value="deposit">Deposit (Add to Safe)</option>
                        <option value="withdrawal">Withdrawal (Remove)</option>
                        <option value="adjustment">Adjustment</option>
                    </select>
                </div>
                <div class="mb-3">
                    <label>Amount *</label>
                    <input type="number" id="txnAmt" class="form-control" step="0.01" required>
                </div>
                <div class="mb-3">
                    <label>Description *</label>
                    <input type="text" id="txnDesc" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label>Notes</label>
                    <textarea id="txnNotes" class="form-control" rows="2"></textarea>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                <button class="btn btn-primary" onclick="save()">Save</button>
            </div>
        </div>
    </div>
</div>

<script>
let modal;
document.addEventListener('DOMContentLoaded', () => {
    modal = new bootstrap.Modal(document.getElementById('addModal'));
    const today = new Date().toISOString().split('T')[0];
    document.getElementById('txnDate').value = today;
    document.getElementById('filterEnd').value = today;
    const ago = new Date(); ago.setDate(ago.getDate() - 30);
    document.getElementById('filterStart').value = ago.toISOString().split('T')[0];
    loadAreas(); loadData();
});

async function loadAreas() {
    const r = await fetch('/accounting/api/areas/', {credentials: 'include'});
    if (r.ok) {
        const areas = await r.json();
        ['filterArea', 'txnArea'].forEach(id => {
            const s = document.getElementById(id);
            areas.forEach(a => {
                const o = document.createElement('option');
                o.value = a.id; o.textContent = a.name;
                s.appendChild(o);
            });
        });
    }
}

async function loadData() {
    const aid = document.getElementById('filterArea').value;
    const u = new URL('/accounting/api/safe/dashboard', location.origin);
    if (aid) u.searchParams.append('area_id', aid);
    const r = await fetch(u, {credentials: 'include'});
    if (r.ok) {
        const d = await r.json();
        document.getElementById('balanceCards').innerHTML = d.balances.map(b =>
            `<div class="col-md-4"><div class="card"><div class="card-body">
                <h6 class="text-muted">${b.area_name}</h6>
                <h3 class="text-success">$${parseFloat(b.current_balance || 0).toFixed(2)}</h3>
                <small>Unposted: ${b.unposted_count}</small>
            </div></div></div>`
        ).join('');
    }
    loadTxns();
}

async function loadTxns() {
    const u = new URL('/accounting/api/safe/transactions', location.origin);
    const aid = document.getElementById('filterArea').value;
    const sd = document.getElementById('filterStart').value;
    const ed = document.getElementById('filterEnd').value;
    const tp = document.getElementById('filterType').value;
    if (aid) u.searchParams.append('area_id', aid);
    if (sd) u.searchParams.append('start_date', sd);
    if (ed) u.searchParams.append('end_date', ed);
    if (tp) u.searchParams.append('transaction_type', tp);
    const r = await fetch(u, {credentials: 'include'});
    if (r.ok) {
        const txns = await r.json();
        const tb = document.getElementById('txnTable');
        tb.innerHTML = txns.length ? txns.map(t => {
            const c = t.transaction_type === 'deposit' ? 'success' : 'danger';
            const s = t.transaction_type === 'withdrawal' ? '-' : '+';
            return `<tr>
                <td>${t.transaction_date}</td>
                <td>${t.area_name}</td>
                <td><span class="badge bg-${c}">${t.transaction_type}</span></td>
                <td>${t.description}</td>
                <td class="text-end text-${c}">${s}$${parseFloat(t.amount || 0).toFixed(2)}</td>
                <td>${t.is_posted ? '<span class="badge bg-success">Posted</span>' : '<span class="badge bg-warning">Draft</span>'}</td>
                <td>${!t.is_posted ? '<button class="btn btn-sm btn-danger" onclick="del('+t.id+')"><i class="bi bi-trash"></i></button>' : ''}</td>
            </tr>`;
        }).join('') : '<tr><td colspan="7" class="text-center">No transactions</td></tr>';
    }
}

function showAddModal() {
    document.getElementById('txnDate').value = new Date().toISOString().split('T')[0];
    modal.show();
}

async function save() {
    const data = {
        area_id: parseInt(document.getElementById('txnArea').value),
        transaction_date: document.getElementById('txnDate').value,
        transaction_type: document.getElementById('txnType').value,
        amount: parseFloat(document.getElementById('txnAmt').value),
        description: document.getElementById('txnDesc').value,
        notes: document.getElementById('txnNotes').value || null
    };
    const r = await fetch('/accounting/api/safe/transactions', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        credentials: 'include',
        body: JSON.stringify(data)
    });
    if (r.ok) {
        modal.hide();
        loadData();
    } else alert('Error');
}

async function del(id) {
    if (!confirm('Delete?')) return;
    const r = await fetch('/accounting/api/safe/transactions/'+id, {method: 'DELETE', credentials: 'include'});
    if (r.ok) loadData();
}
</script>
{% endblock %}
