services:
  inventory-db:
    image: postgres:15
    container_name: inventory-db
    environment:
      POSTGRES_USER: inventory_user
      POSTGRES_PASSWORD: inventory_pass
      POSTGRES_DB: inventory_db
      TZ: America/New_York
    volumes:
    - inventory_data:/var/lib/postgresql/data
    ports:
    - 5432:5432
    healthcheck:
      test:
      - CMD-SHELL
      - pg_isready -U inventory_user -d inventory_db
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
    - restaurant-network
  inventory-redis:
    image: redis:7-alpine
    container_name: inventory-redis
    volumes:
    - redis_data:/data
    healthcheck:
      test:
      - CMD
      - redis-cli
      - ping
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    networks:
    - restaurant-network
    environment:
    - TZ=America/New_York
  inventory-app:
    build: ./inventory
    container_name: inventory-app
    volumes:
    - ./inventory/src:/app/src
    - ./inventory/uploads:/app/uploads
    env_file:
    - ./inventory/.env
    environment:
    - TZ=America/New_York
    # DATABASE_URL now comes from .env file
    - REDIS_URL=redis://inventory-redis:6379
    - DEBUG=true
    - SECRET_KEY=dwwaF6T2qYQQeFWQFk2FLA22bqrnMAtLAMdzkDn4Ne8=
    - PORTAL_SECRET_KEY=dwwaF6T2qYQQeFWQFk2FLA22bqrnMAtLAMdzkDn4Ne8=
    - HUB_INTERNAL_API_KEY=fqyUzahSx18ivWkajrVcVcFEi3Edwmy7dC22WMlXHH0=
    depends_on:
      inventory-db:
        condition: service_healthy
      inventory-redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
    - restaurant-network
  accounting-db:
    image: postgres:15
    container_name: accounting-db
    environment:
      POSTGRES_USER: accounting_user
      POSTGRES_PASSWORD: Acc0unt1ng_Pr0d_2024!
      POSTGRES_DB: accounting_db
      TZ: America/New_York
    volumes:
    - accounting_data:/var/lib/postgresql/data
    healthcheck:
      test:
      - CMD-SHELL
      - pg_isready -U accounting_user -d accounting_db
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
    - restaurant-network
  accounting-app:
    build: ./accounting
    container_name: accounting-app
    volumes:
    - ./accounting/src:/app/src
    - ./accounting/alembic:/app/alembic
    - ./accounting/scripts:/app/scripts
    - ./accounting/logs:/app/logs
    env_file:
    - ./accounting/.env
    environment:
    - TZ=America/New_York
    - DATABASE_URL=postgresql://accounting_user:Acc0unt1ng_Pr0d_2024!@accounting-db:5432/accounting_db
    - INVENTORY_API_URL=http://inventory-app:8000/api
    - PORTAL_SECRET_KEY=dwwaF6T2qYQQeFWQFk2FLA22bqrnMAtLAMdzkDn4Ne8=
    - HUB_INTERNAL_API_KEY=fqyUzahSx18ivWkajrVcVcFEi3Edwmy7dC22WMlXHH0=
    - PLAID_CLIENT_ID=68f5d6dad4bf02002290032a
    - PLAID_SECRET=00f91be32c85b9dba803c3cec36060
    - PLAID_ENV=production
    - ANTHROPIC_API_KEY=${ACCOUNTING_ANTHROPIC_API_KEY}
    - GL_REVIEW_AI_MODEL=claude-sonnet-4-6
    - HUB_DATABASE_URL=postgresql://hub_user:hub_password@hub-db:5432/integration_hub_db
    - INVENTORY_DATABASE_URL=postgresql://inventory_user:inventory_pass@inventory-db:5432/inventory_db
    depends_on:
      accounting-db:
        condition: service_healthy
      inventory-app:
        condition: service_started
    restart: unless-stopped
    networks:
    - restaurant-network
  hub-db:
    image: pgvector/pgvector:pg15
    container_name: hub-db
    environment:
      POSTGRES_USER: hub_user
      POSTGRES_PASSWORD: hub_password
      POSTGRES_DB: integration_hub_db
      TZ: America/New_York
    volumes:
    - hub_data:/var/lib/postgresql/data
    healthcheck:
      test:
      - CMD-SHELL
      - pg_isready -U hub_user -d integration_hub_db
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
    - restaurant-network
  integration-hub:
    build: ./integration-hub
    container_name: integration-hub
    volumes:
    - ./integration-hub/src:/app/src
    - ./integration-hub/alembic:/app/alembic
    - ./integration-hub/uploads:/app/uploads
    - ./integration-hub/scripts:/app/scripts
    env_file:
    - ./integration-hub/.env
    environment:
    - TZ=America/New_York
    # DATABASE_URL, INVENTORY_DATABASE_URL, ACCOUNTING_DATABASE_URL now come from .env file
    - INVENTORY_API_URL=http://inventory-app:8000/api
    - ACCOUNTING_API_URL=http://accounting-app:8000/api
    - PORTAL_SECRET_KEY=dwwaF6T2qYQQeFWQFk2FLA22bqrnMAtLAMdzkDn4Ne8=
    - HUB_INTERNAL_API_KEY=fqyUzahSx18ivWkajrVcVcFEi3Edwmy7dC22WMlXHH0=
    depends_on:
      hub-db:
        condition: service_healthy
      inventory-app:
        condition: service_started
      accounting-app:
        condition: service_started
    restart: unless-stopped
    networks:
    - restaurant-network
  hr-db:
    image: postgres:15
    container_name: hr-db
    environment:
      POSTGRES_USER: hr_user
      POSTGRES_PASSWORD: HR_Pr0d_2024!
      POSTGRES_DB: hr_db
      TZ: America/New_York
    volumes:
    - hr_data:/var/lib/postgresql/data
    healthcheck:
      test:
      - CMD-SHELL
      - pg_isready -U hr_user -d hr_db
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
    - restaurant-network
  hr-app:
    build: ./hr
    container_name: hr-app
    volumes:
    - ./hr/src:/app/src
    - ./hr/alembic:/app/alembic
    - ./hr/documents:/app/documents
    env_file:
    - ./hr/.env
    environment:
    - TZ=America/New_York
    - DATABASE_URL=postgresql://hr_user:HR_Pr0d_2024!@hr-db:5432/hr_db
    - REDIS_URL=redis://inventory-redis:6379
    - INVENTORY_API_URL=http://inventory-app:8000/api
    - ACCOUNTING_API_URL=http://accounting-app:8000/api
    - ENCRYPTION_KEY=yX_axNoTYxskNPgHeaoSSi2gM1jXhXvsdwf9acQqKpM=
    - PORTAL_SECRET_KEY=dwwaF6T2qYQQeFWQFk2FLA22bqrnMAtLAMdzkDn4Ne8=
    depends_on:
      hr-db:
        condition: service_healthy
      inventory-redis:
        condition: service_healthy
      inventory-app:
        condition: service_started
    restart: unless-stopped
    networks:
    - restaurant-network
  events-db:
    image: postgres:15
    container_name: events-db
    environment:
      POSTGRES_USER: events_user
      POSTGRES_PASSWORD: events_pass
      POSTGRES_DB: events_db
      TZ: America/New_York
    volumes:
    - events_data:/var/lib/postgresql/data
    healthcheck:
      test:
      - CMD-SHELL
      - pg_isready -U events_user -d events_db
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
    - restaurant-network
  events-redis:
    image: redis:7-alpine
    container_name: events-redis
    volumes:
    - events_redis_data:/data
    healthcheck:
      test:
      - CMD
      - redis-cli
      - ping
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    networks:
    - restaurant-network
    environment:
    - TZ=America/New_York
  events-app:
    build: ./events
    container_name: events-app
    volumes:
    - ./events/src:/app/src
    env_file:
    - ./events/.env
    environment:
    - TZ=America/New_York
    - DATABASE_URL=postgresql://events_user:events_pass@events-db:5432/events_db
    - REDIS_URL=redis://events-redis:6379/0
    - PORTAL_SECRET_KEY=dwwaF6T2qYQQeFWQFk2FLA22bqrnMAtLAMdzkDn4Ne8=
    depends_on:
      events-db:
        condition: service_healthy
      events-redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
    - restaurant-network
  caldav:
    build: ./caldav
    container_name: caldav
    volumes:
    - caldav_data:/data/collections
    environment:
    - TZ=America/New_York
    restart: unless-stopped
    networks:
    - restaurant-network
  portal-app:
    build: ./portal
    container_name: portal-app
    volumes:
    - ./portal/src:/app/src
    - ./portal/templates:/app/templates
    - ./portal/css:/app/static/css
    - ./portal/images:/app/static/images
    - ./portal/js:/app/static/js
    - ./scripts:/opt/restaurant-system/scripts:ro
    - ./backups:/opt/restaurant-system/backups:ro
    - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
    - TZ=America/New_York
    - HR_DATABASE_URL=postgresql://hr_user:HR_Pr0d_2024!@hr-db:5432/hr_db
    - SECRET_KEY=dwwaF6T2qYQQeFWQFk2FLA22bqrnMAtLAMdzkDn4Ne8=
    - INVENTORY_API_URL=http://inventory-app:8000
    - ACCOUNTING_API_URL=http://accounting-app:8000
    - HR_API_URL=http://hr-app:8000
    - INTEGRATION_HUB_URL=http://integration-hub:8000
    - MAILCOW_API_URL=https://mail-nginx-mailcow-1:8843
    - MAILCOW_API_KEY=06c052141dffe88dc2f9e2cb519d2006216e1a370078896c552a3c1de47b92d9
    - MAIL_DOMAIN=swhgrp.com
    depends_on:
      hr-db:
        condition: service_healthy
    restart: unless-stopped
    networks:
    - restaurant-network
  files-app:
    build: ./files
    container_name: files-app
    volumes:
    - ./files/src:/app/src
    - ./files/logs:/app/logs
    - ./files/storage:/app/storage
    env_file:
    - ./files/.env
    depends_on:
      hr-db:
        condition: service_healthy
    restart: unless-stopped
    networks:
    - restaurant-network
    environment:
    - TZ=America/New_York
    - PORTAL_SECRET_KEY=dwwaF6T2qYQQeFWQFk2FLA22bqrnMAtLAMdzkDn4Ne8=
  onlyoffice:
    image: onlyoffice/documentserver:latest
    container_name: onlyoffice-documentserver
    restart: unless-stopped
    networks:
    - restaurant-network
    environment:
    - TZ=America/New_York
    - JWT_ENABLED=true
    - JWT_SECRET=your-super-secret-jwt-key-change-in-production
    volumes:
    - onlyoffice_data:/var/www/onlyoffice/Data
    - onlyoffice_logs:/var/log/onlyoffice
  websites-db:
    image: postgres:15
    container_name: websites-db
    environment:
      POSTGRES_USER: websites_user
      POSTGRES_PASSWORD: W3bs1t3s_Pr0d_2024!
      POSTGRES_DB: websites_db
      TZ: America/New_York
    volumes:
    - websites_data:/var/lib/postgresql/data
    healthcheck:
      test:
      - CMD-SHELL
      - pg_isready -U websites_user -d websites_db
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
    - restaurant-network
  websites-app:
    build: ./websites
    container_name: websites-app
    volumes:
    - ./websites/src/websites:/app
    - ./websites/alembic:/app/alembic
    - ./websites/generated:/app/generated
    - ./websites/uploads:/app/uploads
    environment:
    - TZ=America/New_York
    - DATABASE_URL=postgresql://websites_user:W3bs1t3s_Pr0d_2024!@websites-db:5432/websites_db
    - SECRET_KEY=dwwaF6T2qYQQeFWQFk2FLA22bqrnMAtLAMdzkDn4Ne8=
    - PORTAL_SSO_SECRET=dwwaF6T2qYQQeFWQFk2FLA22bqrnMAtLAMdzkDn4Ne8=
    depends_on:
      websites-db:
        condition: service_healthy
    restart: unless-stopped
    networks:
    - restaurant-network
  maintenance-postgres:
    image: postgres:15-alpine
    container_name: maintenance-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: maintenance
      POSTGRES_PASSWORD: maintenance
      POSTGRES_DB: maintenance
      TZ: America/New_York
    volumes:
    - maintenance_postgres_data:/var/lib/postgresql/data
    networks:
    - restaurant-network
    healthcheck:
      test:
      - CMD-SHELL
      - pg_isready -U maintenance
      interval: 10s
      timeout: 5s
      retries: 5
  maintenance-service:
    build: ./maintenance
    container_name: maintenance-service
    restart: unless-stopped
    ports:
    - 8006:8000
    environment:
    - DATABASE_URL=postgresql+asyncpg://maintenance:maintenance@maintenance-postgres:5432/maintenance
    - DATABASE_URL_SYNC=postgresql://maintenance:maintenance@maintenance-postgres:5432/maintenance
    - DEBUG=false
    - SERVICE_NAME=maintenance-service
    - PYTHONPATH=/app/src
    - TZ=America/New_York
    depends_on:
      maintenance-postgres:
        condition: service_healthy
    networks:
    - restaurant-network
    volumes:
    - ./maintenance/src:/app/src:ro
    - maintenance_uploads:/app/uploads/maintenance
    healthcheck:
      test:
      - CMD
      - python
      - -c
      - import urllib.request; urllib.request.urlopen('http://localhost:8000/health')
      interval: 30s
      timeout: 10s
      retries: 3
  food-safety-postgres:
    image: postgres:15-alpine
    container_name: food-safety-postgres
    restart: unless-stopped
    ports:
    - 5440:5432
    environment:
      POSTGRES_USER: food_safety
      POSTGRES_PASSWORD: food_safety_password
      POSTGRES_DB: food_safety
      TZ: America/New_York
    volumes:
    - food_safety_postgres_data:/var/lib/postgresql/data
    networks:
    - restaurant-network
    healthcheck:
      test:
      - CMD-SHELL
      - pg_isready -U food_safety
      interval: 10s
      timeout: 5s
      retries: 5
  food-safety-service:
    build: ./food-safety
    container_name: food-safety-service
    restart: unless-stopped
    ports:
    - 8007:8000
    environment:
    - DATABASE_URL=postgresql+asyncpg://food_safety:food_safety_password@food-safety-postgres:5432/food_safety
    - DATABASE_URL_SYNC=postgresql://food_safety:food_safety_password@food-safety-postgres:5432/food_safety
    - DEBUG=false
    - SERVICE_NAME=food-safety-service
    - PYTHONPATH=/app
    - HR_SERVICE_URL=http://hr-app:8000
    - INVENTORY_SERVICE_URL=http://inventory-app:8000
    - PORTAL_SERVICE_URL=http://portal-app:8000
    - MAINTENANCE_SERVICE_URL=http://maintenance-service:8000
    - PORTAL_SECRET_KEY=dwwaF6T2qYQQeFWQFk2FLA22bqrnMAtLAMdzkDn4Ne8=
    - TZ=America/New_York
    volumes:
    - incident_uploads:/app/uploads/incidents
    depends_on:
      food-safety-postgres:
        condition: service_healthy
    networks:
    - restaurant-network
    healthcheck:
      test:
      - CMD
      - python
      - -c
      - import urllib.request; urllib.request.urlopen('http://localhost:8000/health')
      interval: 30s
      timeout: 10s
      retries: 3
  cookbook-db:
    image: postgres:15-alpine
    container_name: cookbook-db
    restart: unless-stopped
    ports:
    - 5441:5432
    environment:
      POSTGRES_USER: cookbook_user
      POSTGRES_PASSWORD: cookbook_pass
      POSTGRES_DB: cookbook_db
      TZ: America/New_York
    volumes:
    - cookbook_data:/var/lib/postgresql/data
    networks:
    - restaurant-network
    healthcheck:
      test:
      - CMD-SHELL
      - pg_isready -U cookbook_user -d cookbook_db
      interval: 10s
      timeout: 5s
      retries: 5
  cookbook-app:
    build: ./cookbook
    container_name: cookbook-app
    restart: unless-stopped
    ports:
    - 8008:8000
    env_file:
    - ./cookbook/.env
    environment:
    - PORTAL_SECRET_KEY=dwwaF6T2qYQQeFWQFk2FLA22bqrnMAtLAMdzkDn4Ne8=
    - TZ=America/New_York
    depends_on:
      cookbook-db:
        condition: service_healthy
    networks:
    - restaurant-network
    volumes:
    - ./cookbook/src:/app/src
    - cookbook_uploads:/app/uploads
    - cookbook_chroma:/app/chroma_data
    healthcheck:
      test:
      - CMD
      - python
      - -c
      - import urllib.request; urllib.request.urlopen('http://localhost:8000/health')
      interval: 30s
      timeout: 10s
      retries: 3
  nginx:
    image: nginx:alpine
    container_name: nginx-proxy
    ports:
    - 80:80
    - 443:443
    volumes:
    - ./shared/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    - ./shared/nginx/conf.d:/etc/nginx/conf.d:ro
    - ./portal:/var/www/portal:ro
    - ./inventory/src/restaurant_inventory/static:/app/static:ro
    - ./inventory/uploads:/app/uploads:ro
    - ./shared/certbot/conf:/etc/letsencrypt:ro
    - ./shared/certbot/www:/var/www/certbot:ro
    depends_on:
    - inventory-app
    - accounting-app
    - events-app
    - hr-app
    - integration-hub
    - portal-app
    - files-app
    - onlyoffice
    - websites-app
    - maintenance-service
    - food-safety-service
    - cookbook-app
    restart: unless-stopped
    networks:
    - restaurant-network
    environment:
    - TZ=America/New_York
  certbot:
    image: certbot/certbot
    container_name: certbot
    volumes:
    - ./shared/certbot/conf:/etc/letsencrypt
    - ./shared/certbot/www:/var/www/certbot
    entrypoint: /bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h &
      wait $${!}; done;'
    networks:
    - restaurant-network
    environment:
    - TZ=America/New_York
volumes:
  inventory_data:
    external: true
    name: restaurant-inventory_postgres_data
  redis_data:
    external: true
    name: restaurant-inventory_redis_data
  accounting_data:
    external: true
    name: restaurant-inventory_accounting_data
  hub_data:
    name: restaurant-integration-hub_data
  hr_data:
    name: restaurant-hr_data
  events_data:
    name: restaurant-events_data
  events_redis_data:
    name: restaurant-events_redis_data
  caldav_data:
    name: restaurant-caldav_data
  onlyoffice_data:
    name: restaurant-onlyoffice_data
  onlyoffice_logs:
    name: restaurant-onlyoffice_logs
  websites_data:
    name: restaurant-websites_data
  maintenance_postgres_data:
    external: true
    name: maintenance_maintenance_postgres_data
  maintenance_uploads:
    external: true
    name: maintenance_maintenance_uploads
  food_safety_postgres_data:
    external: true
    name: food-safety_food_safety_postgres_data
  incident_uploads:
    external: true
    name: food-safety_incident_uploads
  cookbook_data:
    name: restaurant-cookbook_data
  cookbook_uploads:
    name: restaurant-cookbook_uploads
  cookbook_chroma:
    name: restaurant-cookbook_chroma
networks:
  restaurant-network:
    name: restaurant-network
    driver: bridge
