version: '3.8'

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: inventory_user
      POSTGRES_PASSWORD: inventory_pass
      POSTGRES_DB: inventory_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U inventory_user -d inventory_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  app:
    build: .
    volumes:
      - ./src:/app/src
      - ./uploads:/app/uploads
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://inventory_user:inventory_pass@db:5432/inventory_db
      - REDIS_URL=redis://redis:6379
      - DEBUG=true
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./src/restaurant_inventory/static:/app/static:ro
      - ./uploads:/app/uploads:ro
      - ./certbot/conf:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot:ro
    depends_on:
      - app
    restart: unless-stopped

  certbot:
    image: certbot/certbot
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"

  # Accounting Service
  accounting-db:
    image: postgres:15
    environment:
      POSTGRES_USER: accounting_user
      POSTGRES_PASSWORD: Acc0unt1ng_Pr0d_2024!
      POSTGRES_DB: accounting_db
    volumes:
      - accounting_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U accounting_user -d accounting_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    profiles:
      - accounting

  accounting-app:
    build: ./accounting
    volumes:
      - ./accounting/src:/app/src
      - ./accounting/logs:/app/logs
    env_file:
      - ./accounting/.env
    environment:
      - DATABASE_URL=postgresql://accounting_user:Acc0unt1ng_Pr0d_2024!@accounting-db:5432/accounting_db
      - INVENTORY_API_URL=http://app:8000/api
    depends_on:
      accounting-db:
        condition: service_healthy
      app:
        condition: service_started
    restart: unless-stopped
    profiles:
      - accounting

volumes:
  postgres_data:
  redis_data:
  accounting_data:
