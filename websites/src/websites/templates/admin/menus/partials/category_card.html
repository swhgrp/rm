<div class="card category-card" data-id="{{ category.id }}">
    <div class="card-header d-flex justify-content-between align-items-center">
        <div class="d-flex align-items-center gap-2">
            <i class="bi bi-grip-vertical category-drag-handle drag-handle"></i>
            <input type="text"
                   class="form-control form-control-sm bg-transparent border-0"
                   style="width: 200px;"
                   value="{{ category.name }}"
                   name="name"
                   hx-put="/websites/htmx/categories/{{ category.id }}"
                   hx-trigger="blur changed"
                   hx-swap="none">
        </div>
        <div class="d-flex gap-2">
            <button class="btn btn-sm btn-outline-primary"
                    hx-post="/websites/htmx/categories/{{ category.id }}/items"
                    hx-target="#items-{{ category.id }}"
                    hx-swap="beforeend">
                <i class="bi bi-plus"></i> Add Item
            </button>
            <button class="btn btn-sm btn-outline-danger"
                    hx-delete="/websites/htmx/categories/{{ category.id }}"
                    hx-target="closest .category-card"
                    hx-swap="outerHTML"
                    hx-confirm="Delete this category and all its items?">
                <i class="bi bi-trash"></i>
            </button>
        </div>
    </div>
    <div class="card-body">
        <div class="mb-3">
            <input type="text"
                   class="form-control form-control-sm"
                   value="{{ category.description or '' }}"
                   name="description"
                   placeholder="Category description (optional)"
                   hx-put="/websites/htmx/categories/{{ category.id }}"
                   hx-trigger="blur changed"
                   hx-swap="none">
        </div>
        <div id="items-{{ category.id }}" class="items-container">
            {% for item in category.items %}
            {% include "admin/menus/partials/item_row.html" %}
            {% endfor %}
        </div>
    </div>
</div>
