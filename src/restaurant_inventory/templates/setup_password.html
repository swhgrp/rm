<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Set Up Your Password - SW Hospitality Group</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.10.0/font/bootstrap-icons.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #0d1117 0%, #161b22 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #c9d1d9;
        }

        .setup-container {
            max-width: 500px;
            width: 100%;
            padding: 20px;
        }

        .setup-card {
            background-color: #161b22;
            border: 1px solid #30363d;
            border-radius: 8px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.3);
            padding: 40px;
        }

        .logo {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo img {
            max-width: 200px;
            height: auto;
        }

        .welcome-text {
            text-align: center;
            margin-bottom: 30px;
        }

        .welcome-text h2 {
            color: #58a6ff;
            margin-bottom: 10px;
        }

        .form-control {
            background-color: #0d1117;
            border-color: #30363d;
            color: #c9d1d9;
        }

        .form-control:focus {
            background-color: #0d1117;
            border-color: #58a6ff;
            color: #c9d1d9;
            box-shadow: 0 0 0 0.25rem rgba(88, 166, 255, 0.25);
        }

        .btn-primary {
            background-color: #0d6efd;
            border-color: #0d6efd;
            padding: 12px;
            font-weight: 600;
        }

        .btn-primary:hover {
            background-color: #0b5ed7;
            border-color: #0a58ca;
        }

        .password-strength {
            height: 4px;
            border-radius: 2px;
            margin-top: 8px;
            transition: all 0.3s;
        }

        .password-requirements {
            font-size: 0.875rem;
            margin-top: 10px;
        }

        .requirement {
            color: #8b949e;
            margin: 5px 0;
        }

        .requirement.met {
            color: #3fb950;
        }

        .requirement i {
            margin-right: 5px;
        }

        .alert {
            border-radius: 6px;
            border: 1px solid #30363d;
        }

        .spinner-border-sm {
            width: 1rem;
            height: 1rem;
            border-width: 0.15em;
        }
    </style>
</head>
<body>
    <div class="setup-container">
        <div class="setup-card">
            <div class="logo">
                <img src="/static/images/sw-logo.png?v=5" alt="SW Hospitality Group">
            </div>

            <div class="welcome-text" id="welcomeText">
                <h2>Welcome!</h2>
                <p class="text-muted">Loading your invitation...</p>
            </div>

            <div id="loadingState" class="text-center">
                <div class="spinner-border text-primary" role="status">
                    <span class="visually-hidden">Loading...</span>
                </div>
            </div>

            <div id="errorState" style="display: none;">
                <div class="alert alert-danger">
                    <i class="bi bi-exclamation-triangle"></i>
                    <strong>Error:</strong> <span id="errorMessage"></span>
                </div>
                <div class="text-center mt-3">
                    <a href="/login" class="btn btn-secondary">Go to Login</a>
                </div>
            </div>

            <div id="setupForm" style="display: none;">
                <form onsubmit="handleSubmit(event)">
                    <div class="mb-3">
                        <label class="form-label">Username</label>
                        <input type="text" class="form-control" id="username" readonly>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Email</label>
                        <input type="email" class="form-control" id="email" readonly>
                    </div>

                    <div class="mb-3">
                        <label for="password" class="form-label">Create Your Password *</label>
                        <div class="input-group">
                            <input
                                type="password"
                                class="form-control"
                                id="password"
                                required
                                oninput="checkPasswordStrength()"
                            >
                            <button
                                class="btn btn-outline-secondary"
                                type="button"
                                onclick="togglePassword('password')"
                            >
                                <i class="bi bi-eye" id="password-icon"></i>
                            </button>
                        </div>
                        <div class="password-strength" id="passwordStrength"></div>

                        <div class="password-requirements">
                            <div class="requirement" id="req-length">
                                <i class="bi bi-circle"></i> At least 8 characters
                            </div>
                            <div class="requirement" id="req-uppercase">
                                <i class="bi bi-circle"></i> One uppercase letter
                            </div>
                            <div class="requirement" id="req-lowercase">
                                <i class="bi bi-circle"></i> One lowercase letter
                            </div>
                            <div class="requirement" id="req-number">
                                <i class="bi bi-circle"></i> One number
                            </div>
                        </div>
                    </div>

                    <div class="mb-4">
                        <label for="confirmPassword" class="form-label">Confirm Password *</label>
                        <div class="input-group">
                            <input
                                type="password"
                                class="form-control"
                                id="confirmPassword"
                                required
                                oninput="checkPasswordMatch()"
                            >
                            <button
                                class="btn btn-outline-secondary"
                                type="button"
                                onclick="togglePassword('confirmPassword')"
                            >
                                <i class="bi bi-eye" id="confirmPassword-icon"></i>
                            </button>
                        </div>
                        <div id="passwordMatch" class="form-text" style="display: none;"></div>
                    </div>

                    <div id="submitError" class="alert alert-danger" style="display: none;"></div>

                    <button type="submit" class="btn btn-primary w-100" id="submitBtn">
                        <span id="submitText">Activate My Account</span>
                        <span id="submitSpinner" style="display: none;">
                            <span class="spinner-border spinner-border-sm" role="status"></span>
                            Setting up...
                        </span>
                    </button>
                </form>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/js/bootstrap.bundle.min.js"></script>
    <script>
        let token = '';
        let userInfo = null;

        // Get token from URL
        window.addEventListener('DOMContentLoaded', function() {
            const urlParams = new URLSearchParams(window.location.search);
            token = urlParams.get('token');

            if (!token) {
                showError('No invitation token provided. Please check your invitation email.');
                return;
            }

            verifyToken();
        });

        async function verifyToken() {
            try {
                const response = await fetch(`/api/auth/verify-token/${token}`);
                const data = await response.json();

                if (!response.ok) {
                    showError(data.detail || 'Invalid or expired invitation link.');
                    return;
                }

                // Token is valid, show setup form
                userInfo = data;
                showSetupForm();

            } catch (error) {
                console.error('Error verifying token:', error);
                showError('Failed to verify invitation. Please try again or contact your administrator.');
            }
        }

        function showSetupForm() {
            document.getElementById('loadingState').style.display = 'none';
            document.getElementById('setupForm').style.display = 'block';

            // Update welcome text
            document.getElementById('welcomeText').innerHTML = `
                <h2>Welcome, ${userInfo.full_name}!</h2>
                <p class="text-muted">Set up your password to activate your account</p>
            `;

            // Fill in readonly fields
            document.getElementById('username').value = userInfo.username;
            document.getElementById('email').value = userInfo.email;
        }

        function showError(message) {
            document.getElementById('loadingState').style.display = 'none';
            document.getElementById('errorState').style.display = 'block';
            document.getElementById('errorMessage').textContent = message;
        }

        function togglePassword(fieldId) {
            const field = document.getElementById(fieldId);
            const icon = document.getElementById(fieldId + '-icon');

            if (field.type === 'password') {
                field.type = 'text';
                icon.className = 'bi bi-eye-slash';
            } else {
                field.type = 'password';
                icon.className = 'bi bi-eye';
            }
        }

        function checkPasswordStrength() {
            const password = document.getElementById('password').value;
            const strengthBar = document.getElementById('passwordStrength');

            // Check requirements
            const hasLength = password.length >= 8;
            const hasUppercase = /[A-Z]/.test(password);
            const hasLowercase = /[a-z]/.test(password);
            const hasNumber = /[0-9]/.test(password);

            // Update requirement indicators
            updateRequirement('req-length', hasLength);
            updateRequirement('req-uppercase', hasUppercase);
            updateRequirement('req-lowercase', hasLowercase);
            updateRequirement('req-number', hasNumber);

            // Calculate strength
            let strength = 0;
            if (hasLength) strength += 25;
            if (hasUppercase) strength += 25;
            if (hasLowercase) strength += 25;
            if (hasNumber) strength += 25;

            // Update strength bar
            strengthBar.style.width = strength + '%';
            if (strength <= 25) {
                strengthBar.style.backgroundColor = '#dc3545';
            } else if (strength <= 50) {
                strengthBar.style.backgroundColor = '#ffc107';
            } else if (strength <= 75) {
                strengthBar.style.backgroundColor = '#17a2b8';
            } else {
                strengthBar.style.backgroundColor = '#28a745';
            }

            checkPasswordMatch();
        }

        function updateRequirement(id, met) {
            const elem = document.getElementById(id);
            if (met) {
                elem.classList.add('met');
                elem.querySelector('i').className = 'bi bi-check-circle-fill';
            } else {
                elem.classList.remove('met');
                elem.querySelector('i').className = 'bi bi-circle';
            }
        }

        function checkPasswordMatch() {
            const password = document.getElementById('password').value;
            const confirm = document.getElementById('confirmPassword').value;
            const matchDiv = document.getElementById('passwordMatch');

            if (confirm.length === 0) {
                matchDiv.style.display = 'none';
                return;
            }

            matchDiv.style.display = 'block';
            if (password === confirm) {
                matchDiv.className = 'form-text text-success';
                matchDiv.innerHTML = '<i class="bi bi-check-circle"></i> Passwords match';
            } else {
                matchDiv.className = 'form-text text-danger';
                matchDiv.innerHTML = '<i class="bi bi-x-circle"></i> Passwords do not match';
            }
        }

        async function handleSubmit(event) {
            event.preventDefault();

            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const submitBtn = document.getElementById('submitBtn');
            const submitText = document.getElementById('submitText');
            const submitSpinner = document.getElementById('submitSpinner');
            const errorDiv = document.getElementById('submitError');

            // Validate
            if (password !== confirmPassword) {
                errorDiv.textContent = 'Passwords do not match';
                errorDiv.style.display = 'block';
                return;
            }

            if (password.length < 8) {
                errorDiv.textContent = 'Password must be at least 8 characters long';
                errorDiv.style.display = 'block';
                return;
            }

            // Hide error
            errorDiv.style.display = 'none';

            // Disable button and show spinner
            submitBtn.disabled = true;
            submitText.style.display = 'none';
            submitSpinner.style.display = 'inline';

            try {
                const response = await fetch('/api/auth/setup-password', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        token: token,
                        password: password
                    })
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.detail || 'Failed to set up password');
                }

                // Success! Store token and redirect
                localStorage.setItem('access_token', data.access_token);
                localStorage.setItem('user', JSON.stringify(data.user));

                // Show success message briefly then redirect
                document.getElementById('setupForm').innerHTML = `
                    <div class="alert alert-success text-center">
                        <i class="bi bi-check-circle fs-1"></i>
                        <h4 class="mt-3">Account Activated Successfully!</h4>
                        <p>Redirecting to dashboard...</p>
                    </div>
                `;

                setTimeout(() => {
                    window.location.href = '/dashboard';
                }, 2000);

            } catch (error) {
                console.error('Error setting up password:', error);
                errorDiv.textContent = error.message;
                errorDiv.style.display = 'block';

                // Re-enable button
                submitBtn.disabled = false;
                submitText.style.display = 'inline';
                submitSpinner.style.display = 'none';
            }
        }
    </script>
</body>
</html>
