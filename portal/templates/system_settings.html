<!DOCTYPE html>
<html lang="en" data-bs-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Settings - Restaurant Management Portal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #ECEFF1;
            --bg-secondary: #FFFFFF;
            --bg-tertiary: #F5F5F5;
            --border-primary: #CFD8DC;
            --text-primary: #263238;
            --text-secondary: #546E7A;
            --accent-primary: #455A64;
            --accent-hover: #263238;
            --success: #43A047;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
        }

        .navbar {
            background-color: #455A64;
            padding: 15px 30px;
            box-shadow: 0 2px 8px rgba(69, 90, 100, 0.3);
        }

        .navbar-brand {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .navbar-brand img {
            height: 40px;
            filter: brightness(0) invert(1);
        }

        .navbar-brand h1 {
            font-size: 20px;
            font-weight: 600;
            color: #FFFFFF;
            margin: 0;
        }

        .btn-back {
            padding: 8px 16px;
            background-color: rgba(255, 255, 255, 0.15);
            color: #FFFFFF;
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 6px;
            text-decoration: none;
            font-size: 14px;
        }

        .btn-back:hover {
            background-color: rgba(255, 255, 255, 0.25);
            color: #FFFFFF;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        .page-header {
            margin-bottom: 30px;
        }

        .page-header h2 {
            color: var(--text-primary);
            font-size: 28px;
            margin-bottom: 10px;
        }

        .page-header p {
            color: var(--text-secondary);
            font-size: 16px;
        }

        .settings-card {
            background-color: var(--bg-secondary);
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.15);
            border: 1px solid var(--border-primary);
            padding: 30px;
            margin-bottom: 20px;
        }

        .settings-card h3 {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid var(--border-primary);
        }

        .settings-card h3 i {
            margin-right: 10px;
            color: var(--accent-primary);
        }

        .form-label {
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 8px;
        }

        .form-text {
            color: var(--text-secondary);
            font-size: 13px;
        }

        .form-select {
            border: 1px solid var(--border-primary);
            border-radius: 6px;
            padding: 10px 15px;
        }

        .form-select:focus {
            border-color: var(--accent-primary);
            box-shadow: 0 0 0 3px rgba(69, 90, 100, 0.15);
        }

        .btn-save {
            background-color: var(--accent-primary);
            color: white;
            border: none;
            padding: 10px 24px;
            border-radius: 6px;
            font-weight: 600;
        }

        .btn-save:hover {
            background-color: var(--accent-hover);
            color: white;
        }

        .alert {
            border-radius: 8px;
            padding: 15px 20px;
        }

        .current-time {
            background-color: var(--bg-tertiary);
            padding: 15px;
            border-radius: 8px;
            margin-top: 15px;
            font-family: monospace;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="navbar-brand">
            <img src="/portal/static/logo.png" alt="Logo" onerror="this.style.display='none'">
            <h1>System Settings</h1>
        </div>
        <a href="/portal/" class="btn-back">
            <i class="bi bi-arrow-left"></i> Back to Portal
        </a>
    </nav>

    <div class="container">
        <div class="page-header">
            <h2><i class="bi bi-gear"></i> System Settings</h2>
            <p>Configure system-wide settings for all services</p>
        </div>

        <div id="alertContainer"></div>

        <div class="settings-card">
            <h3><i class="bi bi-clock"></i> Date & Time</h3>

            <form id="timezoneForm">
                <div class="mb-3">
                    <label for="timezone" class="form-label">System Timezone</label>
                    <select class="form-select" id="timezone" name="timezone">
                        <optgroup label="US Timezones">
                            <option value="America/New_York" {% if current_timezone == 'America/New_York' %}selected{% endif %}>Eastern Time (America/New_York)</option>
                            <option value="America/Chicago" {% if current_timezone == 'America/Chicago' %}selected{% endif %}>Central Time (America/Chicago)</option>
                            <option value="America/Denver" {% if current_timezone == 'America/Denver' %}selected{% endif %}>Mountain Time (America/Denver)</option>
                            <option value="America/Los_Angeles" {% if current_timezone == 'America/Los_Angeles' %}selected{% endif %}>Pacific Time (America/Los_Angeles)</option>
                            <option value="America/Anchorage" {% if current_timezone == 'America/Anchorage' %}selected{% endif %}>Alaska Time (America/Anchorage)</option>
                            <option value="Pacific/Honolulu" {% if current_timezone == 'Pacific/Honolulu' %}selected{% endif %}>Hawaii Time (Pacific/Honolulu)</option>
                        </optgroup>
                        <optgroup label="Other">
                            <option value="UTC" {% if current_timezone == 'UTC' %}selected{% endif %}>UTC</option>
                        </optgroup>
                    </select>
                    <div class="form-text">
                        This timezone will be used for all timestamps across all systems (Inventory, Accounting, HR, etc.)
                    </div>
                </div>

                <div class="current-time">
                    <strong>Current Time:</strong> <span id="currentTime">Loading...</span>
                </div>

                <div class="mt-4">
                    <button type="submit" class="btn btn-save">
                        <i class="bi bi-check-lg"></i> Save Changes
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Update current time display
        function updateCurrentTime() {
            const timezone = document.getElementById('timezone').value;
            const now = new Date();
            const options = {
                timeZone: timezone,
                weekday: 'long',
                year: 'numeric',
                month: 'long',
                day: 'numeric',
                hour: '2-digit',
                minute: '2-digit',
                second: '2-digit',
                timeZoneName: 'short'
            };
            document.getElementById('currentTime').textContent = now.toLocaleString('en-US', options);
        }

        // Update time every second
        updateCurrentTime();
        setInterval(updateCurrentTime, 1000);

        // Update when timezone changes
        document.getElementById('timezone').addEventListener('change', updateCurrentTime);

        // Form submission
        document.getElementById('timezoneForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            const formData = new FormData(this);

            try {
                const response = await fetch('/portal/api/system-settings/timezone', {
                    method: 'POST',
                    body: formData
                });

                const result = await response.json();

                if (result.success) {
                    showAlert('success', result.message);
                } else {
                    showAlert('danger', result.detail || 'Failed to save settings');
                }
            } catch (error) {
                showAlert('danger', 'Error saving settings: ' + error.message);
            }
        });

        function showAlert(type, message) {
            const container = document.getElementById('alertContainer');
            container.innerHTML = `
                <div class="alert alert-${type} alert-dismissible fade show" role="alert">
                    <i class="bi bi-${type === 'success' ? 'check-circle' : 'exclamation-triangle'}"></i>
                    ${message}
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
            `;

            // Auto-dismiss after 5 seconds
            setTimeout(() => {
                const alert = container.querySelector('.alert');
                if (alert) {
                    alert.classList.remove('show');
                    setTimeout(() => alert.remove(), 150);
                }
            }, 5000);
        }
    </script>
</body>
</html>
