<!DOCTYPE html>
<html lang="en" data-bs-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - SW Hospitality Group Portal</title>
    <style>
        /* =====================================================
           SW Hospitality Group - Slate Blue Light Theme (Login)
           ===================================================== */

        :root {
            /* Background colors - light grey */
            --bg-primary: #ECEFF1;
            --bg-secondary: #FFFFFF;
            --bg-tertiary: #F5F5F5;
            --bg-elevated: #E0E0E0;

            /* Border colors - blue-grey tones */
            --border-primary: #CFD8DC;
            --border-secondary: #B0BEC5;

            /* Text colors - dark for readability */
            --text-primary: #263238;
            --text-secondary: #546E7A;
            --text-muted: #78909C;

            /* Accent colors - Slate Blue */
            --accent-primary: #455A64;
            --accent-secondary: #37474F;
            --accent-hover: #263238;
            --accent-muted: #546E7A;

            /* Semantic colors */
            --success: #43A047;
            --success-bg: rgba(67, 160, 71, 0.1);
            --error: #E53935;
            --error-bg: rgba(229, 57, 53, 0.1);

            /* Shadows */
            --shadow-lg: 0 10px 15px rgba(0, 0, 0, 0.15);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background-color: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-container {
            background-color: var(--bg-secondary);
            border: 1px solid var(--border-primary);
            padding: 40px;
            border-radius: 12px;
            width: 100%;
            max-width: 400px;
            box-shadow: var(--shadow-lg);
        }

        .login-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .login-header img {
            max-width: 150px;
            margin-bottom: 20px;
        }

        .login-header h1 {
            margin: 0;
            font-size: 24px;
            color: var(--text-primary);
        }

        .login-header p {
            margin: 10px 0 0 0;
            color: var(--text-secondary);
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: var(--text-primary);
            font-weight: 500;
        }

        .form-group input {
            width: 100%;
            padding: 12px;
            background-color: var(--bg-primary);
            border: 1px solid var(--border-primary);
            border-radius: 6px;
            font-size: 14px;
            color: var(--text-primary);
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--accent-primary);
            box-shadow: 0 0 0 3px rgba(69, 90, 100, 0.15);
        }

        .form-group input::placeholder {
            color: var(--text-muted);
        }

        .success-message {
            background-color: var(--success-bg);
            color: var(--success);
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 20px;
            border: 1px solid var(--success);
        }

        .error-message {
            background-color: var(--error-bg);
            color: var(--error);
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 20px;
            border: 1px solid var(--error);
        }

        .btn-submit {
            width: 100%;
            padding: 12px;
            background-color: var(--accent-primary);
            color: #FFFFFF;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s, transform 0.1s;
        }

        .btn-submit:hover {
            background-color: var(--accent-hover);
        }

        .btn-submit:active {
            background-color: var(--accent-secondary);
            transform: translateY(1px);
        }

        .back-link {
            text-align: center;
            margin-top: 20px;
        }

        .back-link a {
            color: var(--accent-primary);
            text-decoration: none;
            font-size: 14px;
        }

        .back-link a:hover {
            text-decoration: underline;
        }

        .password-requirements {
            font-size: 12px;
            color: var(--text-secondary);
            margin-top: -12px;
            margin-bottom: 20px;
        }

        @media (max-width: 480px) {
            .login-container {
                margin: 20px;
                padding: 30px 20px;
            }

            .login-header h1 {
                font-size: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <img src="/portal/static/images/sw-logo.png" alt="Restaurant Logo">
            <h1>Reset Password</h1>
            <p>Enter your new password below</p>
        </div>

        {% if success %}
        <div class="success-message">
            {{ success }}
        </div>
        <div class="back-link">
            <a href="/portal/login">← Go to Login</a>
        </div>
        {% elif error %}
        <div class="error-message">
            {{ error }}
        </div>
        <div class="back-link">
            <a href="/portal/forgot-password">← Request New Reset Link</a>
        </div>
        {% else %}
        <form method="post" action="/portal/reset-password">
            <input type="hidden" name="token" value="{{ token }}">

            <div class="form-group">
                <label for="new_password">New Password</label>
                <input type="password" id="new_password" name="new_password" required autofocus>
            </div>
            <div class="password-requirements">
                Must be at least 8 characters long
            </div>

            <div class="form-group">
                <label for="confirm_password">Confirm Password</label>
                <input type="password" id="confirm_password" name="confirm_password" required>
            </div>

            <button type="submit" class="btn-submit">Reset Password</button>
        </form>
        {% endif %}
    </div>
</body>
</html>
