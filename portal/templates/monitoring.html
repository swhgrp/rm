<!DOCTYPE html>
<html lang="en" data-bs-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>System Monitoring - SW Hospitality Group</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.10.0/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        /* =====================================================
           SW Hospitality Group - Slate Blue Light Theme (Monitoring)
           ===================================================== */

        :root {
            /* Background colors - light grey */
            --bg-primary: #ECEFF1;
            --bg-secondary: #FFFFFF;
            --bg-tertiary: #F5F5F5;
            --bg-elevated: #E0E0E0;

            /* Border colors - blue-grey tones */
            --border-primary: #CFD8DC;
            --border-secondary: #B0BEC5;

            /* Text colors - dark for readability */
            --text-primary: #263238;
            --text-secondary: #546E7A;
            --text-muted: #78909C;

            /* Accent colors - Slate Blue */
            --accent-primary: #455A64;
            --accent-secondary: #37474F;
            --accent-hover: #263238;
            --accent-muted: #546E7A;

            /* Semantic colors */
            --success: #43A047;
            --success-bg: rgba(67, 160, 71, 0.1);
            --error: #E53935;
            --error-bg: rgba(229, 57, 53, 0.1);
            --warning: #FB8C00;
            --warning-bg: rgba(251, 140, 0, 0.1);

            /* Shadows */
            --shadow-sm: 0 1px 3px rgba(0, 0, 0, 0.12);
            --shadow-md: 0 2px 8px rgba(0, 0, 0, 0.15);
            --glow-accent: 0 0 15px rgba(69, 90, 100, 0.15);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background-color: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
        }

        .navbar {
            background-color: #455A64;
            border-bottom: none;
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 8px rgba(69, 90, 100, 0.3);
        }

        .navbar-brand {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .navbar-brand h1 {
            font-size: 20px;
            font-weight: 600;
            color: #FFFFFF;
        }

        .navbar-brand h1 i {
            color: #FFFFFF;
        }

        .navbar-actions {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .last-updated {
            font-size: 13px;
            color: rgba(255, 255, 255, 0.8);
        }

        .btn-refresh,
        .btn-back {
            padding: 8px 16px;
            background-color: rgba(255, 255, 255, 0.15);
            color: #FFFFFF;
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 6px;
            text-decoration: none;
            font-size: 14px;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
        }

        .btn-refresh:hover,
        .btn-back:hover {
            background-color: rgba(255, 255, 255, 0.25);
            border-color: rgba(255, 255, 255, 0.5);
            color: #FFFFFF;
        }

        .container {
            max-width: 1600px;
            margin: 0 auto;
            padding: 30px 20px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }

        .card {
            background-color: var(--bg-secondary);
            border: 1px solid var(--border-primary);
            border-radius: 12px;
            padding: 20px;
            transition: all 0.2s ease;
        }

        .card:hover {
            border-color: var(--accent-muted);
            box-shadow: var(--glow-accent);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 12px;
            border-bottom: 1px solid var(--border-primary);
        }

        .card-title {
            font-size: 16px;
            font-weight: 600;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .card-title i {
            color: var(--accent-primary);
        }

        .status-badge {
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
        }

        .status-ok {
            background: var(--success);
            color: #FFFFFF;
        }

        .status-warning {
            background: var(--warning);
            color: #FFFFFF;
        }

        .status-critical {
            background: var(--error);
            color: #FFFFFF;
        }

        .metric {
            margin: 15px 0;
        }

        .metric-label {
            font-size: 13px;
            color: var(--text-secondary);
            margin-bottom: 6px;
        }

        .metric-value {
            font-size: 24px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .metric-value.large {
            font-size: 32px;
            color: var(--accent-primary);
        }

        .service-list {
            list-style: none;
        }

        .service-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid var(--border-primary);
        }

        .service-item:last-child {
            border-bottom: none;
        }

        .service-name {
            font-weight: 500;
            color: var(--text-primary);
        }

        .service-status {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 13px;
            color: var(--text-secondary);
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            display: inline-block;
        }

        .status-dot.green {
            background: var(--success);
        }

        .status-dot.red {
            background: var(--error);
        }

        .status-dot.yellow {
            background: var(--warning);
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: var(--bg-tertiary);
            border-radius: 4px;
            overflow: hidden;
            margin-top: 8px;
        }

        .progress-fill {
            height: 100%;
            transition: width 0.5s ease;
            border-radius: 4px;
        }

        .progress-fill.green {
            background: var(--success);
        }

        .progress-fill.yellow {
            background: var(--warning);
        }

        .progress-fill.red {
            background: var(--error);
        }

        .loading {
            text-align: center;
            padding: 60px 20px;
            font-size: 16px;
            color: var(--text-secondary);
        }

        .error {
            background: var(--bg-secondary);
            border: 1px solid var(--error);
            padding: 20px;
            border-radius: 12px;
            margin: 20px 0;
        }

        .error h3 {
            color: var(--error);
            margin-bottom: 10px;
        }

        .error p {
            color: var(--text-secondary);
            margin: 5px 0;
        }

        .alert-item,
        .error-item {
            font-family: 'Courier New', monospace;
            font-size: 12px;
            padding: 8px;
            background: var(--bg-primary);
            border-radius: 4px;
            margin-bottom: 8px;
            color: var(--text-secondary);
            word-break: break-all;
        }

        .alert-item:last-child,
        .error-item:last-child {
            margin-bottom: 0;
        }

        .no-items {
            text-align: center;
            padding: 20px;
            color: var(--text-muted);
            font-style: italic;
        }

        .two-column-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        @media (max-width: 1200px) {
            .two-column-grid {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 768px) {
            .navbar {
                padding: 12px 15px;
            }

            .navbar-brand h1 {
                font-size: 16px;
            }

            .navbar-actions {
                gap: 10px;
            }

            .btn-text {
                display: none;
            }

            .container {
                padding: 20px 15px;
            }

            .grid {
                grid-template-columns: 1fr;
                gap: 15px;
            }

            .card {
                padding: 16px;
            }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="navbar-brand">
            <h1><i class="bi bi-graph-up"></i> System Monitoring</h1>
        </div>
        <div class="navbar-actions">
            <div class="last-updated">Last updated: <span id="lastUpdated">Loading...</span></div>
            <button class="btn-refresh" onclick="loadDashboard()">
                <i class="bi bi-arrow-clockwise"></i>
                <span class="btn-text">Refresh</span>
            </button>
            <a href="/portal" class="btn-back">
                <i class="bi bi-arrow-left"></i>
                <span class="btn-text">Back to Portal</span>
            </a>
        </div>
    </nav>

    <div class="container">
        <div id="dashboard" class="loading">
            Loading system status...
        </div>
    </div>

    <script>
        async function loadDashboard() {
            try {
                // Add timestamp to prevent caching
                const cacheBuster = new Date().getTime();
                const response = await fetch(`/portal/api/monitoring/status?t=${cacheBuster}`, {
                    credentials: 'same-origin',
                    cache: 'no-store'
                });
                const data = await response.json();
                console.log('Received monitoring data:', {
                    timestamp: data.timestamp,
                    generated_at: data.generated_at,
                    cacheBuster: cacheBuster
                });

                // Format timestamp to local time (handle both UTC and local formats)
                let displayTime = data.generated_at;
                if (displayTime && displayTime.includes('UTC')) {
                    // Convert UTC to local time
                    const utcDate = new Date(displayTime.replace(' UTC', 'Z'));
                    displayTime = utcDate.toLocaleString('en-US', {
                        year: 'numeric',
                        month: '2-digit',
                        day: '2-digit',
                        hour: '2-digit',
                        minute: '2-digit',
                        second: '2-digit',
                        timeZoneName: 'short'
                    });
                }
                document.getElementById('lastUpdated').textContent = displayTime;

                const html = `
                    <!-- Top Priority: System Resources & Microservices -->
                    <div class="two-column-grid" style="margin-bottom: 20px;">
                        <!-- System Resources -->
                        <div class="card">
                            <div class="card-header">
                                <div class="card-title"><i class="bi bi-cpu"></i> System Resources</div>
                                <span class="status-badge ${getDiskStatus(data.system.disk_usage_percent)}">
                                    ${data.system.disk_usage_percent < 80 ? 'OK' : data.system.disk_usage_percent < 90 ? 'WARNING' : 'CRITICAL'}
                                </span>
                            </div>
                            <div class="metric">
                                <div class="metric-label">Disk Usage</div>
                                <div class="metric-value">${data.system.disk_usage_percent}%</div>
                                <div class="progress-bar">
                                    <div class="progress-fill ${getDiskColor(data.system.disk_usage_percent)}"
                                         style="width: ${data.system.disk_usage_percent}%"></div>
                                </div>
                            </div>
                            <div class="metric">
                                <div class="metric-label">Free Space</div>
                                <div class="metric-value" style="font-size: 18px;">${data.system.disk_free}</div>
                            </div>
                            <div class="metric">
                                <div class="metric-label">Memory</div>
                                <div class="metric-value" style="font-size: 18px;">${data.system.memory_used} / ${data.system.memory_total}</div>
                            </div>
                            <div class="metric">
                                <div class="metric-label">Uptime</div>
                                <div class="metric-value" style="font-size: 16px;">${data.system.uptime}</div>
                            </div>
                        </div>

                        <!-- Microservices -->
                        <div class="card">
                            <div class="card-header">
                                <div class="card-title"><i class="bi bi-grid"></i> Microservices (${countHealthy(data.services)}/8)</div>
                            </div>
                            <ul class="service-list">
                                ${generateServiceList(data.services)}
                            </ul>
                        </div>
                    </div>

                    <!-- Application Health Status - Temporarily disabled due to race conditions -->

                    <!-- Databases & Backups -->
                    <div class="two-column-grid" style="margin-bottom: 20px;">
                        <!-- Databases -->
                        <div class="card">
                            <div class="card-header">
                                <div class="card-title"><i class="bi bi-database"></i> Databases (${countHealthyDBs(data.databases)}/6)</div>
                            </div>
                            <ul class="service-list">
                                ${generateDatabaseList(data.databases)}
                            </ul>
                        </div>

                        <!-- Backup Details -->
                        <div class="card">
                            <div class="card-header">
                                <div class="card-title"><i class="bi bi-archive-fill"></i> Backup Details</div>
                            </div>
                            <ul class="service-list">
                                ${generateBackupDetailsList(data.backup_details)}
                            </ul>
                        </div>
                    </div>

                    <!-- Infrastructure Status -->
                    <div class="grid" style="grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); margin-bottom: 20px;">
                        <div class="card">
                            <div class="card-header">
                                <div class="card-title"><i class="bi bi-hdd-network"></i> Reverse Proxy</div>
                                <span class="status-badge status-${getNginxStatus(data.nginx)}">
                                    ${data.nginx.health.toUpperCase()}
                                </span>
                            </div>
                            <div class="metric">
                                <div class="metric-label">Status</div>
                                <div class="metric-value" style="font-size: 18px;">${data.nginx.status}</div>
                            </div>
                            <div class="metric">
                                <div class="metric-label">Uptime</div>
                                <div class="metric-value" style="font-size: 16px;">${Math.floor(data.nginx.uptime_minutes / 60)}h ${data.nginx.uptime_minutes % 60}m</div>
                            </div>
                        </div>

                        <div class="card">
                            <div class="card-header">
                                <div class="card-title"><i class="bi bi-diagram-3"></i> Docker Network</div>
                                <span class="status-badge status-${getNetworkStatus(data.network)}">
                                    ${data.network.health.toUpperCase()}
                                </span>
                            </div>
                            <div class="metric">
                                <div class="metric-label">Status</div>
                                <div class="metric-value" style="font-size: 18px;">${data.network.status}</div>
                            </div>
                            <div class="metric">
                                <div class="metric-label">Containers</div>
                                <div class="metric-value large">${data.network.containers}</div>
                            </div>
                        </div>

                        <div class="card">
                            <div class="card-header">
                                <div class="card-title"><i class="bi bi-shield-lock"></i> SSL Certificate</div>
                                <span class="status-badge status-${data.ssl.status}">
                                    ${data.ssl.status.toUpperCase()}
                                </span>
                            </div>
                            <div class="metric">
                                <div class="metric-label">Days Remaining</div>
                                <div class="metric-value large">${data.ssl.days_remaining}</div>
                            </div>
                            <div class="metric">
                                <div class="metric-label">Expires</div>
                                <div class="metric-value" style="font-size: 13px;">${data.ssl.expiry_date.split(' ').slice(0, 4).join(' ')}</div>
                            </div>
                        </div>
                    </div>

                    <!-- Logs & Alerts -->
                    <div class="two-column-grid">
                        <!-- Recent Errors -->
                        <div class="card">
                            <div class="card-header">
                                <div class="card-title"><i class="bi bi-exclamation-triangle"></i> Recent Errors</div>
                            </div>
                            ${generateErrorsList(data.recent_errors)}
                        </div>

                        <!-- Recent Alerts -->
                        <div class="card">
                            <div class="card-header">
                                <div class="card-title"><i class="bi bi-bell"></i> Recent Alerts</div>
                            </div>
                            ${generateAlertsList(data.recent_alerts)}
                        </div>
                    </div>
                `;

                document.getElementById('dashboard').innerHTML = html;
            } catch (error) {
                document.getElementById('dashboard').innerHTML = `
                    <div class="error">
                        <h3><i class="bi bi-exclamation-triangle"></i> Error Loading Dashboard</h3>
                        <p>${error.message}</p>
                        <p>Please check that the monitoring API is running.</p>
                    </div>
                `;
            }
        }

        function getDiskStatus(usage) {
            if (usage < 80) return 'status-ok';
            if (usage < 90) return 'status-warning';
            return 'status-critical';
        }

        function getDiskColor(usage) {
            if (usage < 80) return 'green';
            if (usage < 90) return 'yellow';
            return 'red';
        }

        function getNginxStatus(nginx) {
            if (nginx.health === 'healthy') return 'status-ok';
            if (nginx.health === 'unhealthy') return 'status-warning';
            return 'status-critical';
        }

        function getNetworkStatus(network) {
            if (network.health === 'healthy') return 'status-ok';
            if (network.health === 'degraded') return 'status-warning';
            return 'status-critical';
        }

        function countHealthy(services) {
            return Object.values(services).filter(s => s.status === 'running' || s.health === 'healthy').length;
        }

        function countHealthyDBs(databases) {
            return Object.values(databases).filter(db => db.status === 'healthy').length;
        }

        function countHealthyApps(appHealth) {
            return Object.values(appHealth).filter(app => app.status === 'healthy').length;
        }

        function generateServiceList(services) {
            return Object.entries(services).map(([name, service]) => `
                <li class="service-item">
                    <div class="service-name">${formatServiceName(name)}</div>
                    <div class="service-status">
                        <span class="status-dot ${service.health === 'healthy' || service.status === 'running' ? 'green' : 'red'}"></span>
                        <span>${service.status} · ${Math.floor(service.uptime_minutes / 60)}h ${service.uptime_minutes % 60}m</span>
                    </div>
                </li>
            `).join('');
        }

        function generateDatabaseList(databases) {
            return Object.entries(databases).map(([name, db]) => `
                <li class="service-item">
                    <div class="service-name">${formatDBName(name)}</div>
                    <div class="service-status">
                        <span class="status-dot ${db.status === 'healthy' ? 'green' : 'red'}"></span>
                        <span>${db.status} · ${db.size} · ${db.connections} conn</span>
                    </div>
                </li>
            `).join('');
        }

        function generateBackupDetailsList(backupDetails) {
            return Object.entries(backupDetails).map(([dbname, details]) => `
                <li class="service-item">
                    <div class="service-name">${formatBackupDBName(dbname)}</div>
                    <div class="service-status">
                        <span class="status-dot ${details.status === 'ok' ? 'green' : 'red'}"></span>
                        <span>${details.backup_count} backups · ${details.latest_size} · ${details.latest_backup}</span>
                    </div>
                </li>
            `).join('');
        }

        function generateAppHealthList(appHealth) {
            return Object.entries(appHealth).map(([name, app]) => `
                <li class="service-item">
                    <div class="service-name">${formatServiceName(name)}</div>
                    <div class="service-status">
                        <span class="status-dot ${app.status === 'healthy' ? 'green' : app.status === 'unhealthy' ? 'yellow' : 'red'}"></span>
                        <span>${app.status} · HTTP ${app.http_code} · ${app.response_time_ms}ms</span>
                    </div>
                </li>
            `).join('');
        }

        function generateErrorsList(errors) {
            if (!errors || errors.length === 0 || (errors.length === 1 && errors[0] === 'No recent errors')) {
                return '<div class="no-items">No recent errors</div>';
            }
            return '<div>' + errors.map(error => `<div class="error-item">${escapeHtml(error)}</div>`).join('') + '</div>';
        }

        function generateAlertsList(alerts) {
            if (!alerts || alerts.length === 0 || (alerts.length === 1 && alerts[0] === 'No recent alerts')) {
                return '<div class="no-items">No recent alerts</div>';
            }
            return '<div>' + alerts.map(alert => `<div class="alert-item">${escapeHtml(alert)}</div>`).join('') + '</div>';
        }

        function formatServiceName(name) {
            return name.replace(/-app$/, '').replace(/-/g, ' ').replace(/\b\w/g, l => l.toUpperCase());
        }

        function formatDBName(name) {
            return name.replace(/-db$/, '').replace(/-/g, ' ').replace(/\b\w/g, l => l.toUpperCase()) + ' DB';
        }

        function formatBackupDBName(name) {
            return name.replace(/_db$/, '').replace(/_/g, ' ').replace(/\b\w/g, l => l.toUpperCase()) + ' DB';
        }

        function escapeHtml(text) {
            const map = {
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                '"': '&quot;',
                "'": '&#039;'
            };
            return text.replace(/[&<>"']/g, m => map[m]);
        }

        // Load dashboard on page load
        loadDashboard();

        // Auto-refresh every 60 seconds
        setInterval(loadDashboard, 60000);
    </script>
</body>
</html>
