<!DOCTYPE html>
<html lang="en" data-bs-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Work Orders - Maintenance - SW Hospitality Group</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.10.0/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #ECEFF1;
            --bg-secondary: #FFFFFF;
            --bg-tertiary: #F5F5F5;
            --bg-elevated: #E0E0E0;
            --border-primary: #CFD8DC;
            --border-secondary: #B0BEC5;
            --text-primary: #263238;
            --text-secondary: #546E7A;
            --text-muted: #78909C;
            --accent-primary: #455A64;
            --accent-secondary: #37474F;
            --accent-hover: #263238;
            --accent-muted: #546E7A;
            --success: #43A047;
            --success-bg: rgba(67, 160, 71, 0.1);
            --error: #E53935;
            --error-bg: rgba(229, 57, 53, 0.1);
            --warning: #FB8C00;
            --warning-bg: rgba(251, 140, 0, 0.1);
            --info: #1E88E5;
            --info-bg: rgba(30, 136, 229, 0.1);
            --shadow-sm: 0 1px 3px rgba(0, 0, 0, 0.12);
            --shadow-md: 0 2px 8px rgba(0, 0, 0, 0.15);
            --glow-accent: 0 0 15px rgba(69, 90, 100, 0.15);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
        }

        .navbar {
            background-color: #455A64;
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 8px rgba(69, 90, 100, 0.3);
        }

        .navbar-brand h1 {
            font-size: 20px;
            font-weight: 600;
            color: #FFFFFF;
        }

        .navbar-nav {
            display: flex;
            gap: 10px;
        }

        .nav-link, .btn-back {
            padding: 8px 16px;
            background-color: rgba(255, 255, 255, 0.15);
            color: #FFFFFF;
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 6px;
            text-decoration: none;
            font-size: 14px;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .nav-link:hover, .btn-back:hover {
            background-color: rgba(255, 255, 255, 0.25);
            border-color: rgba(255, 255, 255, 0.5);
        }

        .nav-link.active {
            background-color: rgba(255, 255, 255, 0.25);
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 30px 20px;
        }

        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            flex-wrap: wrap;
            gap: 15px;
        }

        .page-title {
            font-size: 28px;
            font-weight: 600;
        }

        .btn-primary {
            padding: 10px 20px;
            background-color: var(--accent-primary);
            color: #FFFFFF;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s ease;
        }

        .btn-primary:hover {
            background-color: var(--accent-hover);
        }

        .filters-bar {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .search-box {
            flex: 1;
            min-width: 200px;
            max-width: 400px;
            position: relative;
        }

        .search-box input {
            width: 100%;
            padding: 10px 15px 10px 40px;
            border: 1px solid var(--border-primary);
            border-radius: 6px;
            font-size: 14px;
            background-color: var(--bg-secondary);
        }

        .search-box input:focus {
            outline: none;
            border-color: var(--accent-primary);
        }

        .search-box i {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
        }

        .filter-select {
            padding: 10px 15px;
            border: 1px solid var(--border-primary);
            border-radius: 6px;
            font-size: 14px;
            background-color: var(--bg-secondary);
            min-width: 140px;
        }

        .filter-select:focus {
            outline: none;
            border-color: var(--accent-primary);
        }

        .card {
            background-color: var(--bg-secondary);
            border: 1px solid var(--border-primary);
            border-radius: 12px;
            overflow: hidden;
        }

        .table-container {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            padding: 12px 15px;
            text-align: left;
            border-bottom: 1px solid var(--border-primary);
        }

        th {
            background-color: var(--bg-tertiary);
            font-weight: 600;
            font-size: 13px;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        tr:hover {
            background-color: var(--bg-tertiary);
        }

        tr:last-child td {
            border-bottom: none;
        }

        .badge {
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 500;
        }

        .badge-open { background-color: var(--info-bg); color: var(--info); }
        .badge-in_progress { background-color: var(--warning-bg); color: var(--warning); }
        .badge-on_hold { background-color: var(--bg-elevated); color: var(--text-secondary); }
        .badge-completed { background-color: var(--success-bg); color: var(--success); }
        .badge-cancelled { background-color: var(--error-bg); color: var(--error); }

        .badge-critical { background-color: var(--error-bg); color: var(--error); }
        .badge-high { background-color: var(--warning-bg); color: var(--warning); }
        .badge-medium { background-color: var(--info-bg); color: var(--info); }
        .badge-low { background-color: var(--success-bg); color: var(--success); }

        .actions-cell {
            display: flex;
            gap: 8px;
        }

        .btn-icon {
            padding: 6px 10px;
            border: 1px solid var(--border-primary);
            border-radius: 4px;
            background-color: var(--bg-secondary);
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s ease;
        }

        .btn-icon:hover {
            background-color: var(--bg-tertiary);
            border-color: var(--accent-primary);
            color: var(--accent-primary);
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-muted);
        }

        .empty-state i {
            font-size: 64px;
            margin-bottom: 20px;
            opacity: 0.5;
        }

        .loading {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 60px;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid var(--border-primary);
            border-top-color: var(--accent-primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .pagination {
            display: flex;
            justify-content: center;
            gap: 5px;
            padding: 20px;
            border-top: 1px solid var(--border-primary);
        }

        .pagination button {
            padding: 8px 12px;
            border: 1px solid var(--border-primary);
            border-radius: 4px;
            background-color: var(--bg-secondary);
            cursor: pointer;
            font-size: 14px;
        }

        .pagination button:hover:not(:disabled) {
            background-color: var(--bg-tertiary);
        }

        .pagination button.active {
            background-color: var(--accent-primary);
            color: white;
            border-color: var(--accent-primary);
        }

        .pagination button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* Modal styles */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal {
            background-color: var(--bg-secondary);
            border-radius: 12px;
            max-width: 700px;
            width: 90%;
            max-height: 90vh;
            overflow-y: auto;
        }

        .modal-header {
            padding: 20px;
            border-bottom: 1px solid var(--border-primary);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-title {
            font-size: 18px;
            font-weight: 600;
        }

        .modal-close {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            color: var(--text-muted);
        }

        .modal-body {
            padding: 20px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: var(--text-secondary);
        }

        .form-group input, .form-group select, .form-group textarea {
            width: 100%;
            padding: 10px 15px;
            border: 1px solid var(--border-primary);
            border-radius: 6px;
            font-size: 14px;
            background-color: var(--bg-secondary);
        }

        .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
            outline: none;
            border-color: var(--accent-primary);
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .modal-footer {
            padding: 20px;
            border-top: 1px solid var(--border-primary);
            display: flex;
            justify-content: flex-end;
            gap: 10px;
        }

        .btn-secondary {
            padding: 10px 20px;
            background-color: var(--bg-tertiary);
            color: var(--text-primary);
            border: 1px solid var(--border-primary);
            border-radius: 6px;
            font-size: 14px;
            cursor: pointer;
        }

        .btn-secondary:hover {
            background-color: var(--bg-elevated);
        }

        .wo-detail-section {
            margin-bottom: 25px;
        }

        .wo-detail-section h4 {
            font-size: 14px;
            color: var(--text-secondary);
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .wo-detail-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
        }

        .wo-detail-item label {
            font-size: 12px;
            color: var(--text-muted);
            display: block;
            margin-bottom: 4px;
        }

        .wo-detail-item span {
            font-size: 14px;
            color: var(--text-primary);
        }

        .wo-description {
            background-color: var(--bg-tertiary);
            padding: 15px;
            border-radius: 8px;
            font-size: 14px;
            line-height: 1.5;
        }

        .status-actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .btn-status {
            padding: 8px 16px;
            border: 1px solid var(--border-primary);
            border-radius: 6px;
            background-color: var(--bg-secondary);
            cursor: pointer;
            font-size: 13px;
            transition: all 0.2s ease;
        }

        .btn-status:hover {
            background-color: var(--bg-tertiary);
        }

        .btn-status.active {
            background-color: var(--accent-primary);
            color: white;
            border-color: var(--accent-primary);
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="navbar-brand">
            <h1><i class="bi bi-tools"></i> Maintenance</h1>
        </div>
        <div class="navbar-nav">
            <a href="/portal/maintenance/" class="nav-link"><i class="bi bi-speedometer2"></i> Dashboard</a>
            <a href="/portal/maintenance/equipment" class="nav-link"><i class="bi bi-gear"></i> Equipment</a>
            <a href="/portal/maintenance/work-orders" class="nav-link active"><i class="bi bi-clipboard-check"></i> Work Orders</a>
            <a href="/portal/maintenance/schedules" class="nav-link"><i class="bi bi-calendar-check"></i> Schedules</a>
            <a href="/portal/" class="btn-back"><i class="bi bi-arrow-left"></i> Portal</a>
        </div>
    </nav>

    <div class="container">
        <div class="page-header">
            <h2 class="page-title">Work Orders</h2>
            <button class="btn-primary" onclick="openCreateModal()">
                <i class="bi bi-plus-lg"></i> New Work Order
            </button>
        </div>

        <div class="filters-bar">
            <div class="search-box">
                <i class="bi bi-search"></i>
                <input type="text" id="searchInput" placeholder="Search work orders..." oninput="filterWorkOrders()">
            </div>
            <select class="filter-select" id="statusFilter" onchange="filterWorkOrders()">
                <option value="">All Statuses</option>
                <option value="open">Open</option>
                <option value="in_progress">In Progress</option>
                <option value="on_hold">On Hold</option>
                <option value="completed">Completed</option>
                <option value="cancelled">Cancelled</option>
            </select>
            <select class="filter-select" id="priorityFilter" onchange="filterWorkOrders()">
                <option value="">All Priorities</option>
                <option value="critical">Critical</option>
                <option value="high">High</option>
                <option value="medium">Medium</option>
                <option value="low">Low</option>
            </select>
            <select class="filter-select" id="typeFilter" onchange="filterWorkOrders()">
                <option value="">All Types</option>
                <option value="repair">Repair</option>
                <option value="preventive">Preventive</option>
                <option value="inspection">Inspection</option>
                <option value="installation">Installation</option>
                <option value="other">Other</option>
            </select>
        </div>

        <div class="card">
            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>Title</th>
                            <th>Equipment</th>
                            <th>Type</th>
                            <th>Priority</th>
                            <th>Status</th>
                            <th>Assigned To</th>
                            <th>Due Date</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="workOrdersTable">
                        <tr>
                            <td colspan="8">
                                <div class="loading"><div class="spinner"></div></div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
            <div class="pagination" id="pagination"></div>
        </div>
    </div>

    <!-- Create Work Order Modal -->
    <div class="modal-overlay" id="createModal">
        <div class="modal">
            <div class="modal-header">
                <h3 class="modal-title">New Work Order</h3>
                <button class="modal-close" onclick="closeCreateModal()">&times;</button>
            </div>
            <div class="modal-body">
                <form id="workOrderForm">
                    <div class="form-group">
                        <label for="wo_title">Title *</label>
                        <input type="text" id="wo_title" required>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="wo_equipment_id">Equipment</label>
                            <select id="wo_equipment_id">
                                <option value="">Select equipment (optional)</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="wo_type">Type *</label>
                            <select id="wo_type" required>
                                <option value="repair">Repair</option>
                                <option value="preventive">Preventive</option>
                                <option value="inspection">Inspection</option>
                                <option value="installation">Installation</option>
                                <option value="other">Other</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="wo_priority">Priority *</label>
                            <select id="wo_priority" required>
                                <option value="low">Low</option>
                                <option value="medium" selected>Medium</option>
                                <option value="high">High</option>
                                <option value="critical">Critical</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="wo_due_date">Due Date</label>
                            <input type="date" id="wo_due_date">
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="wo_assigned_to">Assigned To</label>
                        <input type="text" id="wo_assigned_to" placeholder="Name of assignee">
                    </div>
                    <div class="form-group">
                        <label for="wo_description">Description</label>
                        <textarea id="wo_description" rows="4" placeholder="Describe the work to be done..."></textarea>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button class="btn-secondary" onclick="closeCreateModal()">Cancel</button>
                <button class="btn-primary" onclick="createWorkOrder()">Create Work Order</button>
            </div>
        </div>
    </div>

    <!-- View/Edit Work Order Modal -->
    <div class="modal-overlay" id="detailModal">
        <div class="modal">
            <div class="modal-header">
                <h3 class="modal-title" id="detailTitle">Work Order Details</h3>
                <button class="modal-close" onclick="closeDetailModal()">&times;</button>
            </div>
            <div class="modal-body" id="detailContent">
                <!-- Content populated by JS -->
            </div>
            <div class="modal-footer">
                <button class="btn-secondary" onclick="closeDetailModal()">Close</button>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = '/maintenance';
        let allWorkOrders = [];
        let equipment = [];
        let currentPage = 1;
        const pageSize = 20;

        async function loadEquipment() {
            try {
                const response = await fetch(`${API_BASE}/equipment`);
                equipment = await response.json();

                const select = document.getElementById('wo_equipment_id');
                select.innerHTML = '<option value="">Select equipment (optional)</option>';
                equipment.forEach(e => {
                    const option = document.createElement('option');
                    option.value = e.id;
                    option.textContent = `${e.name} (${e.location || 'No location'})`;
                    select.appendChild(option);
                });
            } catch (error) {
                console.error('Error loading equipment:', error);
            }
        }

        async function loadWorkOrders() {
            try {
                const response = await fetch(`${API_BASE}/work-orders`);
                allWorkOrders = await response.json();
                filterWorkOrders();
            } catch (error) {
                console.error('Error loading work orders:', error);
                document.getElementById('workOrdersTable').innerHTML = `
                    <tr><td colspan="8">
                        <div class="empty-state">
                            <i class="bi bi-exclamation-circle"></i>
                            <p>Error loading work orders</p>
                        </div>
                    </td></tr>
                `;
            }
        }

        function filterWorkOrders() {
            const search = document.getElementById('searchInput').value.toLowerCase();
            const status = document.getElementById('statusFilter').value;
            const priority = document.getElementById('priorityFilter').value;
            const type = document.getElementById('typeFilter').value;

            let filtered = allWorkOrders.filter(wo => {
                const matchesSearch = !search ||
                    wo.title.toLowerCase().includes(search) ||
                    (wo.description && wo.description.toLowerCase().includes(search));
                const matchesStatus = !status || wo.status === status;
                const matchesPriority = !priority || wo.priority === priority;
                const matchesType = !type || wo.work_order_type === type;
                return matchesSearch && matchesStatus && matchesPriority && matchesType;
            });

            currentPage = 1;
            renderWorkOrders(filtered);
        }

        function renderWorkOrders(workOrders) {
            const tbody = document.getElementById('workOrdersTable');

            if (workOrders.length === 0) {
                tbody.innerHTML = `
                    <tr><td colspan="8">
                        <div class="empty-state">
                            <i class="bi bi-clipboard"></i>
                            <p>No work orders found</p>
                        </div>
                    </td></tr>
                `;
                document.getElementById('pagination').innerHTML = '';
                return;
            }

            const totalPages = Math.ceil(workOrders.length / pageSize);
            const start = (currentPage - 1) * pageSize;
            const pageData = workOrders.slice(start, start + pageSize);

            const statusLabels = {
                'open': 'Open',
                'in_progress': 'In Progress',
                'on_hold': 'On Hold',
                'completed': 'Completed',
                'cancelled': 'Cancelled'
            };

            const typeLabels = {
                'repair': 'Repair',
                'preventive': 'Preventive',
                'inspection': 'Inspection',
                'installation': 'Installation',
                'other': 'Other'
            };

            tbody.innerHTML = pageData.map(wo => {
                const eq = equipment.find(e => e.id === wo.equipment_id);
                const dueDate = wo.due_date ? new Date(wo.due_date).toLocaleDateString() : '-';
                return `
                    <tr>
                        <td><strong>${escapeHtml(wo.title)}</strong></td>
                        <td>${eq ? escapeHtml(eq.name) : '-'}</td>
                        <td>${typeLabels[wo.work_order_type] || wo.work_order_type}</td>
                        <td><span class="badge badge-${wo.priority}">${wo.priority}</span></td>
                        <td><span class="badge badge-${wo.status}">${statusLabels[wo.status] || wo.status}</span></td>
                        <td>${wo.assigned_to ? escapeHtml(wo.assigned_to) : '-'}</td>
                        <td>${dueDate}</td>
                        <td class="actions-cell">
                            <button class="btn-icon" onclick="viewWorkOrder(${wo.id})" title="View">
                                <i class="bi bi-eye"></i>
                            </button>
                            <button class="btn-icon" onclick="editWorkOrder(${wo.id})" title="Edit">
                                <i class="bi bi-pencil"></i>
                            </button>
                        </td>
                    </tr>
                `;
            }).join('');

            renderPagination(totalPages, workOrders);
        }

        function renderPagination(totalPages, workOrders) {
            const pagination = document.getElementById('pagination');
            if (totalPages <= 1) {
                pagination.innerHTML = '';
                return;
            }

            let html = `<button onclick="changePage(${currentPage - 1})" ${currentPage === 1 ? 'disabled' : ''}>
                <i class="bi bi-chevron-left"></i>
            </button>`;

            for (let i = 1; i <= totalPages; i++) {
                if (i === 1 || i === totalPages || (i >= currentPage - 1 && i <= currentPage + 1)) {
                    html += `<button class="${i === currentPage ? 'active' : ''}" onclick="goToPage(${i})">${i}</button>`;
                } else if (i === currentPage - 2 || i === currentPage + 2) {
                    html += `<button disabled>...</button>`;
                }
            }

            html += `<button onclick="changePage(${currentPage + 1})" ${currentPage === totalPages ? 'disabled' : ''}>
                <i class="bi bi-chevron-right"></i>
            </button>`;

            pagination.innerHTML = html;
        }

        function goToPage(page) {
            currentPage = page;
            filterWorkOrders();
        }

        function changePage(page) {
            currentPage = page;
            filterWorkOrders();
        }

        function openCreateModal() {
            document.getElementById('workOrderForm').reset();
            document.getElementById('wo_priority').value = 'medium';
            document.getElementById('createModal').classList.add('active');
        }

        function closeCreateModal() {
            document.getElementById('createModal').classList.remove('active');
        }

        async function createWorkOrder() {
            const data = {
                title: document.getElementById('wo_title').value,
                equipment_id: document.getElementById('wo_equipment_id').value || null,
                work_order_type: document.getElementById('wo_type').value,
                priority: document.getElementById('wo_priority').value,
                due_date: document.getElementById('wo_due_date').value || null,
                assigned_to: document.getElementById('wo_assigned_to').value || null,
                description: document.getElementById('wo_description').value || null,
                status: 'open'
            };

            if (!data.title) {
                alert('Please enter a title');
                return;
            }

            if (data.equipment_id) {
                data.equipment_id = parseInt(data.equipment_id);
            }

            try {
                const response = await fetch(`${API_BASE}/work-orders`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });

                if (response.ok) {
                    closeCreateModal();
                    loadWorkOrders();
                } else {
                    const error = await response.json();
                    alert('Error creating work order: ' + (error.detail || 'Unknown error'));
                }
            } catch (error) {
                console.error('Error creating work order:', error);
                alert('Error creating work order');
            }
        }

        async function viewWorkOrder(id) {
            try {
                const response = await fetch(`${API_BASE}/work-orders/${id}`);
                const wo = await response.json();
                const eq = equipment.find(e => e.id === wo.equipment_id);

                const statusLabels = {
                    'open': 'Open',
                    'in_progress': 'In Progress',
                    'on_hold': 'On Hold',
                    'completed': 'Completed',
                    'cancelled': 'Cancelled'
                };

                const typeLabels = {
                    'repair': 'Repair',
                    'preventive': 'Preventive',
                    'inspection': 'Inspection',
                    'installation': 'Installation',
                    'other': 'Other'
                };

                document.getElementById('detailTitle').textContent = wo.title;
                document.getElementById('detailContent').innerHTML = `
                    <div class="wo-detail-section">
                        <h4>Details</h4>
                        <div class="wo-detail-grid">
                            <div class="wo-detail-item">
                                <label>Status</label>
                                <span class="badge badge-${wo.status}">${statusLabels[wo.status] || wo.status}</span>
                            </div>
                            <div class="wo-detail-item">
                                <label>Priority</label>
                                <span class="badge badge-${wo.priority}">${wo.priority}</span>
                            </div>
                            <div class="wo-detail-item">
                                <label>Type</label>
                                <span>${typeLabels[wo.work_order_type] || wo.work_order_type}</span>
                            </div>
                            <div class="wo-detail-item">
                                <label>Equipment</label>
                                <span>${eq ? escapeHtml(eq.name) : 'None'}</span>
                            </div>
                            <div class="wo-detail-item">
                                <label>Assigned To</label>
                                <span>${wo.assigned_to || 'Unassigned'}</span>
                            </div>
                            <div class="wo-detail-item">
                                <label>Due Date</label>
                                <span>${wo.due_date ? new Date(wo.due_date).toLocaleDateString() : 'Not set'}</span>
                            </div>
                            <div class="wo-detail-item">
                                <label>Created</label>
                                <span>${new Date(wo.created_at).toLocaleDateString()}</span>
                            </div>
                            <div class="wo-detail-item">
                                <label>Completed</label>
                                <span>${wo.completed_at ? new Date(wo.completed_at).toLocaleDateString() : '-'}</span>
                            </div>
                        </div>
                    </div>
                    ${wo.description ? `
                        <div class="wo-detail-section">
                            <h4>Description</h4>
                            <div class="wo-description">${escapeHtml(wo.description)}</div>
                        </div>
                    ` : ''}
                    <div class="wo-detail-section">
                        <h4>Update Status</h4>
                        <div class="status-actions">
                            <button class="btn-status ${wo.status === 'open' ? 'active' : ''}" onclick="updateStatus(${wo.id}, 'open')">Open</button>
                            <button class="btn-status ${wo.status === 'in_progress' ? 'active' : ''}" onclick="updateStatus(${wo.id}, 'in_progress')">In Progress</button>
                            <button class="btn-status ${wo.status === 'on_hold' ? 'active' : ''}" onclick="updateStatus(${wo.id}, 'on_hold')">On Hold</button>
                            <button class="btn-status ${wo.status === 'completed' ? 'active' : ''}" onclick="updateStatus(${wo.id}, 'completed')">Completed</button>
                            <button class="btn-status ${wo.status === 'cancelled' ? 'active' : ''}" onclick="updateStatus(${wo.id}, 'cancelled')">Cancelled</button>
                        </div>
                    </div>
                `;

                document.getElementById('detailModal').classList.add('active');
            } catch (error) {
                console.error('Error loading work order:', error);
                alert('Error loading work order details');
            }
        }

        function closeDetailModal() {
            document.getElementById('detailModal').classList.remove('active');
        }

        async function updateStatus(id, status) {
            try {
                const response = await fetch(`${API_BASE}/work-orders/${id}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ status: status })
                });

                if (response.ok) {
                    loadWorkOrders();
                    viewWorkOrder(id); // Refresh detail view
                } else {
                    const error = await response.json();
                    alert('Error updating status: ' + (error.detail || 'Unknown error'));
                }
            } catch (error) {
                console.error('Error updating status:', error);
                alert('Error updating status');
            }
        }

        function editWorkOrder(id) {
            // For now, just open the detail view - full edit can be added later
            viewWorkOrder(id);
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Initialize
        loadEquipment().then(() => loadWorkOrders());
    </script>
</body>
</html>
