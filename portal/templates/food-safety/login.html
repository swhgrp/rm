<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Safety & Compliance</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.10.0/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #ECEFF1;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-card {
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.12);
            padding: 40px;
            width: 100%;
            max-width: 400px;
            margin: 20px;
        }
        .login-header {
            text-align: center;
            margin-bottom: 30px;
        }
        .login-header i {
            font-size: 40px;
            color: #455A64;
            margin-bottom: 10px;
        }
        .login-header h1 {
            font-size: 22px;
            color: #263238;
            margin-bottom: 5px;
        }
        .login-header p {
            color: #78909C;
            font-size: 14px;
        }
        .form-group {
            margin-bottom: 18px;
        }
        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: #455A64;
            margin-bottom: 6px;
        }
        .form-group input {
            width: 100%;
            padding: 10px 14px;
            border: 1px solid #CFD8DC;
            border-radius: 6px;
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s;
        }
        .form-group input:focus {
            border-color: #455A64;
            box-shadow: 0 0 0 2px rgba(69, 90, 100, 0.1);
        }
        .btn-login {
            width: 100%;
            padding: 12px;
            background: #455A64;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn-login:hover { background: #37474F; }
        .btn-login:disabled { background: #B0BEC5; cursor: not-allowed; }
        .error-msg {
            background: rgba(229, 57, 53, 0.1);
            color: #E53935;
            padding: 10px 14px;
            border-radius: 6px;
            font-size: 13px;
            margin-bottom: 16px;
            display: none;
        }
        .portal-link {
            text-align: center;
            margin-top: 20px;
            font-size: 13px;
            color: #78909C;
        }
        .portal-link a {
            color: #455A64;
            text-decoration: none;
            font-weight: 500;
        }
        .portal-link a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="login-header">
            <i class="bi bi-shield-check"></i>
            <h1>Safety & Compliance</h1>
            <p>SW Hospitality Group</p>
        </div>

        <div class="error-msg" id="errorMsg"></div>

        <form id="loginForm">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" autocomplete="username" required autofocus>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" autocomplete="current-password" required>
            </div>
            <button type="submit" class="btn-login" id="loginBtn">
                <i class="bi bi-box-arrow-in-right"></i> Sign In
            </button>
        </form>

        <div class="portal-link">
            Or sign in via <a href="/portal/login?redirect=/portal/food-safety/">Main Portal</a>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('loginBtn');
            const errorEl = document.getElementById('errorMsg');
            errorEl.style.display = 'none';
            btn.disabled = true;
            btn.innerHTML = '<i class="bi bi-arrow-repeat"></i> Signing in...';

            try {
                const response = await fetch('/food-safety/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        username: document.getElementById('username').value,
                        password: document.getElementById('password').value
                    })
                });

                if (response.ok) {
                    window.location.href = '/portal/food-safety/';
                } else {
                    const error = await response.json();
                    errorEl.textContent = error.detail || 'Login failed';
                    errorEl.style.display = 'block';
                }
            } catch (err) {
                errorEl.textContent = 'Unable to connect to server';
                errorEl.style.display = 'block';
            }

            btn.disabled = false;
            btn.innerHTML = '<i class="bi bi-box-arrow-in-right"></i> Sign In';
        });
    </script>
</body>
</html>
