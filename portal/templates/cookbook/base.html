<!DOCTYPE html>
<html lang="en" data-bs-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Cookbook - SW Hospitality Group{% endblock %}</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.10.0/font/bootstrap-icons.min.css" rel="stylesheet">

    <style>
        :root {
            --bg-primary: #ECEFF1;
            --bg-secondary: #FFFFFF;
            --bg-tertiary: #F5F5F5;
            --bg-elevated: #E0E0E0;
            --border-primary: #CFD8DC;
            --border-secondary: #B0BEC5;
            --text-primary: #263238;
            --text-secondary: #546E7A;
            --text-muted: #78909C;
            --accent-primary: #455A64;
            --accent-secondary: #37474F;
            --accent-hover: #263238;
            --accent-muted: #546E7A;
            --success: #43A047;
            --success-bg: rgba(67, 160, 71, 0.1);
            --error: #E53935;
            --error-bg: rgba(229, 57, 53, 0.1);
            --warning: #FB8C00;
            --warning-bg: rgba(251, 140, 0, 0.1);
            --info: #1E88E5;
            --info-bg: rgba(30, 136, 229, 0.1);
            --shadow-sm: 0 1px 3px rgba(0, 0, 0, 0.12);
            --shadow-md: 0 2px 8px rgba(0, 0, 0, 0.15);
        }

        .toast-container { position: fixed; top: 20px; right: 20px; z-index: 100000; display: flex; flex-direction: column; gap: 10px; }
        .toast { background-color: var(--bg-secondary); border: 1px solid var(--border-primary); border-radius: 8px; padding: 15px 20px; min-width: 300px; max-width: 450px; box-shadow: var(--shadow-md); display: flex; align-items: flex-start; gap: 12px; animation: slideIn 0.3s ease-out; }
        .toast.toast-error { border-left: 4px solid var(--error); }
        .toast.toast-success { border-left: 4px solid var(--success); }
        .toast.toast-warning { border-left: 4px solid var(--warning); }
        .toast.toast-info { border-left: 4px solid var(--info); }
        .toast-icon { font-size: 20px; flex-shrink: 0; }
        .toast-error .toast-icon { color: var(--error); }
        .toast-success .toast-icon { color: var(--success); }
        .toast-warning .toast-icon { color: var(--warning); }
        .toast-info .toast-icon { color: var(--info); }
        .toast-content { flex: 1; }
        .toast-title { font-weight: 600; margin-bottom: 4px; }
        .toast-message { font-size: 14px; color: var(--text-secondary); }
        .toast-close { background: none; border: none; font-size: 18px; cursor: pointer; color: var(--text-muted); padding: 0; line-height: 1; }
        .toast-close:hover { color: var(--text-primary); }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        @keyframes slideOut { from { transform: translateX(0); opacity: 1; } to { transform: translateX(100%); opacity: 0; } }
        .toast.hiding { animation: slideOut 0.3s ease-in forwards; }

        .confirm-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background-color: rgba(0, 0, 0, 0.5); display: flex; justify-content: center; align-items: center; z-index: 100001; animation: fadeIn 0.2s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .confirm-dialog { background-color: var(--bg-secondary); border: 1px solid var(--border-primary); border-radius: 12px; min-width: 380px; max-width: 90%; box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3); animation: scaleIn 0.2s ease; }
        @keyframes scaleIn { from { transform: scale(0.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        .confirm-header { padding: 20px; border-bottom: 1px solid var(--border-primary); display: flex; align-items: center; gap: 12px; }
        .confirm-icon { font-size: 24px; color: var(--warning); }
        .confirm-title { font-size: 18px; font-weight: 600; color: var(--text-primary); }
        .confirm-body { padding: 20px; }
        .confirm-body p { font-size: 15px; color: var(--text-secondary); line-height: 1.5; }
        .confirm-footer { padding: 15px 20px; border-top: 1px solid var(--border-primary); display: flex; justify-content: flex-end; gap: 10px; }
        .confirm-btn { padding: 10px 20px; border-radius: 6px; font-size: 14px; font-weight: 500; cursor: pointer; transition: all 0.2s ease; }
        .confirm-btn-cancel { background-color: var(--bg-tertiary); color: var(--text-primary); border: 1px solid var(--border-primary); }
        .confirm-btn-cancel:hover { background-color: var(--bg-elevated); }
        .confirm-btn-ok { background-color: var(--accent-primary); color: white; border: none; }
        .confirm-btn-ok:hover { background-color: var(--accent-hover); }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg-primary);
            color: var(--text-primary);
            margin: 0; padding: 0;
        }

        .sidebar {
            position: fixed; top: 0; left: 0; height: 100vh; width: 200px;
            background-color: #455A64; padding-top: 20px; z-index: 1000;
            overflow-y: auto; transition: transform 0.3s ease-in-out;
            box-shadow: 2px 0 8px rgba(69, 90, 100, 0.25);
        }
        .sidebar-brand { padding: 20px 15px; text-align: center; color: #FFFFFF; font-size: 16px; font-weight: 600; border-bottom: 1px solid rgba(255, 255, 255, 0.2); margin-bottom: 10px; }
        .sidebar-brand img { max-width: 180px; height: auto; filter: brightness(0) invert(1); }
        .sidebar-nav { list-style: none; padding: 0 0 100px 0; margin: 0; }
        .sidebar-nav li { margin: 0; }
        .sidebar-nav a { display: block; padding: 12px 20px; padding-left: 17px; color: rgba(255, 255, 255, 0.85); text-decoration: none; font-size: 14px; transition: all 0.2s; border-left: 3px solid transparent; }
        .sidebar-nav i { margin-right: 10px; font-size: 16px; width: 20px; display: inline-block; }
        .sidebar-nav a:hover, .sidebar-nav a.active { background-color: rgba(255, 255, 255, 0.15); color: #FFFFFF; border-left: 3px solid #FFFFFF; }
        .submenu { list-style: none; padding-left: 0; margin: 0; max-height: 0; overflow: hidden; transition: max-height 0.3s ease-out; }
        .submenu.open { max-height: 500px; overflow: visible; }
        .submenu li a { padding-left: 50px; font-size: 13px; color: rgba(255, 255, 255, 0.75); white-space: nowrap; }
        .submenu li a:hover, .submenu li a.active { background-color: rgba(255, 255, 255, 0.15); color: #FFFFFF; border-left: 3px solid #FFFFFF; padding-left: 47px; }
        .nav-section-toggle { position: relative; font-weight: 600 !important; color: #FFFFFF !important; background-color: rgba(255, 255, 255, 0.1) !important; border-left: none !important; padding-left: 20px !important; padding-right: 20px !important; display: flex !important; align-items: center; justify-content: space-between; }
        .nav-section-toggle .float-end { font-size: 12px; transition: transform 0.3s ease; flex-shrink: 0; margin-left: auto; padding-left: 8px; }
        .nav-section-toggle.open .float-end { transform: rotate(180deg); }
        .nav-section-toggle:hover { background-color: rgba(255, 255, 255, 0.2) !important; }

        .main-wrapper { margin-left: 200px; min-height: 100vh; display: flex; flex-direction: column; }
        .top-navbar { background-color: var(--bg-secondary); border-bottom: 1px solid var(--border-primary); padding: 12px 20px; display: flex; justify-content: space-between; align-items: center; box-shadow: var(--shadow-sm); }
        .page-title { font-size: 18px; font-weight: 600; color: var(--text-primary); }
        .page-title i { color: var(--accent-primary); }
        .content-area { padding: 20px; flex: 1; }

        .mobile-menu-toggle { display: none; position: fixed; top: 12px; left: 12px; z-index: 1001; background-color: #455A64; border: 1px solid rgba(255, 255, 255, 0.3); color: #FFFFFF; padding: 6px 10px; border-radius: 4px; cursor: pointer; font-size: 22px; line-height: 1; }
        .mobile-menu-toggle:hover { background-color: #37474F; }
        .mobile-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(0, 0, 0, 0.5); z-index: 999; }
        .mobile-overlay.active { display: block; }

        footer { background-color: var(--bg-secondary); border-top: 1px solid var(--border-primary); padding: 15px 0; margin-top: auto; text-align: center; }
        .text-muted { color: var(--text-muted) !important; }

        @media (max-width: 768px) {
            .main-wrapper { margin-left: 0; }
            .sidebar { transform: translateX(-200px); box-shadow: 2px 0 8px rgba(0,0,0,0.3); }
            .sidebar.active { transform: translateX(0); }
            .mobile-menu-toggle { display: flex; align-items: center; justify-content: center; }
            .top-navbar { padding: 10px 10px; }
            .page-title { font-size: 13px; margin-left: 48px; }
            .page-title i { display: none; }
            .content-area { padding: 15px !important; }
        }

        /* Common component styles */
        .card { background: var(--bg-secondary); border: 1px solid var(--border-primary); border-radius: 8px; padding: 20px; margin-bottom: 15px; box-shadow: var(--shadow-sm); }
        .btn { padding: 8px 16px; border-radius: 6px; font-size: 14px; font-weight: 500; cursor: pointer; transition: all 0.2s; border: none; display: inline-flex; align-items: center; gap: 6px; }
        .btn-primary { background-color: var(--accent-primary); color: white; }
        .btn-primary:hover { background-color: var(--accent-hover); }
        .btn-success { background-color: var(--success); color: white; }
        .btn-success:hover { opacity: 0.9; }
        .btn-danger { background-color: var(--error); color: white; }
        .btn-danger:hover { opacity: 0.9; }
        .btn-outline { background: transparent; border: 1px solid var(--border-secondary); color: var(--text-primary); }
        .btn-outline:hover { background: var(--bg-tertiary); }
        .btn-sm { padding: 5px 10px; font-size: 13px; }

        .badge { display: inline-block; padding: 3px 8px; border-radius: 4px; font-size: 12px; font-weight: 500; }
        .badge-success { background: var(--success-bg); color: var(--success); }
        .badge-warning { background: var(--warning-bg); color: var(--warning); }
        .badge-error { background: var(--error-bg); color: var(--error); }
        .badge-info { background: var(--info-bg); color: var(--info); }

        table { width: 100%; border-collapse: collapse; }
        table th { background: var(--bg-tertiary); padding: 10px 12px; text-align: left; font-size: 13px; font-weight: 600; color: var(--text-secondary); border-bottom: 2px solid var(--border-primary); }
        table td { padding: 10px 12px; border-bottom: 1px solid var(--border-primary); font-size: 14px; }
        table tr:hover { background: var(--bg-tertiary); }

        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; font-size: 13px; font-weight: 600; color: var(--text-secondary); margin-bottom: 5px; }
        .form-control { width: 100%; padding: 8px 12px; border: 1px solid var(--border-primary); border-radius: 6px; font-size: 14px; background: var(--bg-secondary); color: var(--text-primary); }
        .form-control:focus { outline: none; border-color: var(--accent-primary); box-shadow: 0 0 0 2px rgba(69, 90, 100, 0.2); }
        select.form-control { appearance: auto; }
        textarea.form-control { min-height: 80px; resize: vertical; }

        .page-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .page-header h2 { font-size: 20px; font-weight: 600; }

        .search-bar { position: relative; margin-bottom: 15px; }
        .search-bar input { width: 100%; padding: 10px 12px 10px 36px; border: 1px solid var(--border-primary); border-radius: 6px; font-size: 14px; background: var(--bg-secondary); }
        .search-bar i { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--text-muted); }

        .actions-wrap { display: inline-flex; gap: 6px; align-items: center; }

        .empty-state { text-align: center; padding: 40px 20px; color: var(--text-muted); }
        .empty-state i { font-size: 48px; margin-bottom: 15px; display: block; }

        .loading-spinner { display: inline-block; width: 20px; height: 20px; border: 2px solid var(--border-primary); border-top-color: var(--accent-primary); border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        {% block extra_styles %}{% endblock %}
    </style>
</head>
<body>
    <div class="toast-container" id="toastContainer"></div>

    <div class="sidebar" id="sidebar">
        <div class="sidebar-brand">
            <img src="/inventory/static/images/sw-logo.png" alt="SW Logo">
        </div>
        <ul class="sidebar-nav">
            <li><a href="/portal/" title="Return to Portal"><i class="bi bi-house-door"></i> Portal Home</a></li>
            <li><a href="/portal/cookbook/" class="{% block nav_dashboard %}{% endblock %}"><i class="bi bi-book"></i> Dashboard</a></li>

            <!-- LOOKUP SECTION -->
            <li>
                <a href="#" class="nav-section-toggle" onclick="toggleSection('lookupSection', event); return false;">
                    <i class="bi bi-search"></i> Lookup
                    <i class="bi bi-chevron-down float-end"></i>
                </a>
                <ul id="lookupSection" class="submenu">
                    <li><a href="/portal/cookbook/lookup" class="{% block nav_lookup %}{% endblock %}"><i class="bi bi-chat-dots"></i> Recipe Lookup</a></li>
                </ul>
            </li>

            <!-- CREATOR SECTION -->
            <li>
                <a href="#" class="nav-section-toggle" onclick="toggleSection('creatorSection', event); return false;">
                    <i class="bi bi-magic"></i> Creator
                    <i class="bi bi-chevron-down float-end"></i>
                </a>
                <ul id="creatorSection" class="submenu">
                    <li><a href="/portal/cookbook/creator" class="{% block nav_creator %}{% endblock %}"><i class="bi bi-plus-lg"></i> Create Recipe</a></li>
                </ul>
            </li>

            <!-- LIBRARY SECTION -->
            <li>
                <a href="#" class="nav-section-toggle" onclick="toggleSection('librarySection', event); return false;">
                    <i class="bi bi-collection"></i> Library
                    <i class="bi bi-chevron-down float-end"></i>
                </a>
                <ul id="librarySection" class="submenu">
                    <li><a href="/portal/cookbook/library" class="{% block nav_library %}{% endblock %}"><i class="bi bi-grid-3x3-gap"></i> All Recipes</a></li>
                </ul>
            </li>

            <!-- ADMIN SECTION -->
            <li>
                <a href="#" class="nav-section-toggle" onclick="toggleSection('adminSection', event); return false;">
                    <i class="bi bi-gear-fill"></i> Admin
                    <i class="bi bi-chevron-down float-end"></i>
                </a>
                <ul id="adminSection" class="submenu">
                    <li><a href="/portal/cookbook/books" class="{% block nav_books %}{% endblock %}"><i class="bi bi-journal-plus"></i> Manage Books</a></li>
                </ul>
            </li>
        </ul>
    </div>

    <div class="mobile-overlay" id="mobileOverlay" onclick="toggleMobileMenu()"></div>
    <button class="mobile-menu-toggle" id="mobileMenuToggle" onclick="toggleMobileMenu()">
        <i class="bi bi-list"></i>
    </button>

    <div class="main-wrapper">
        <div class="top-navbar">
            <div class="page-title">
                <i class="bi bi-book"></i> Cookbook AI
            </div>
        </div>

        <main class="content-area">
            {% block content %}{% endblock %}
        </main>

        <footer>
            <small class="text-muted">&copy; 2026 SW Hospitality Group - Cookbook AI System</small>
        </footer>
    </div>

    <script>
        function toggleSection(sectionId, event) {
            if (event) event.preventDefault();
            const submenu = document.getElementById(sectionId);
            const toggle = event ? event.currentTarget : document.querySelector(`[onclick*="${sectionId}"]`);
            if (submenu.classList.contains('open')) {
                submenu.classList.remove('open');
                toggle.classList.remove('open');
            } else {
                submenu.classList.add('open');
                toggle.classList.add('open');
            }
        }

        function toggleMobileMenu() {
            document.getElementById('sidebar').classList.toggle('active');
            document.getElementById('mobileOverlay').classList.toggle('active');
        }

        document.addEventListener('DOMContentLoaded', function() {
            const currentPath = window.location.pathname;
            const normalizedPath = currentPath.endsWith('/') ? currentPath.slice(0, -1) : currentPath;
            if (normalizedPath === '/portal/cookbook') {
                const dashLink = document.querySelector('a[href="/portal/cookbook/"]');
                if (dashLink) dashLink.classList.add('active');
                return;
            }
            const submenuLinks = document.querySelectorAll('.submenu a');
            let matchedLink = null;
            submenuLinks.forEach(link => {
                const href = link.getAttribute('href');
                if (href) {
                    const normalizedHref = href.endsWith('/') ? href.slice(0, -1) : href;
                    if (normalizedPath === normalizedHref || normalizedPath.startsWith(normalizedHref + '/')) {
                        if (!matchedLink || normalizedHref.length > matchedLink.getAttribute('href').length) {
                            matchedLink = link;
                        }
                    }
                }
            });
            if (matchedLink) {
                matchedLink.classList.add('active');
                const submenu = matchedLink.closest('.submenu');
                if (submenu) {
                    submenu.classList.add('open');
                    const toggle = submenu.previousElementSibling;
                    if (toggle && toggle.classList.contains('nav-section-toggle')) toggle.classList.add('open');
                }
            }
            if (window.innerWidth <= 768) {
                document.querySelectorAll('.sidebar-nav a').forEach(link => {
                    link.addEventListener('click', function() {
                        document.getElementById('sidebar').classList.remove('active');
                        document.getElementById('mobileOverlay').classList.remove('active');
                    });
                });
            }
        });
    </script>

    <script>
        function showToast(message, type = 'info', title = null) {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = `toast toast-${type}`;
            const icons = { error: 'bi-exclamation-circle', success: 'bi-check-circle', warning: 'bi-exclamation-triangle', info: 'bi-info-circle' };
            const titles = { error: 'Error', success: 'Success', warning: 'Warning', info: 'Notice' };
            toast.innerHTML = `<i class="bi ${icons[type]} toast-icon"></i><div class="toast-content"><div class="toast-title">${title || titles[type]}</div><div class="toast-message">${message}</div></div><button class="toast-close" onclick="this.parentElement.remove()">&times;</button>`;
            container.appendChild(toast);
            setTimeout(() => { toast.classList.add('hiding'); setTimeout(() => toast.remove(), 300); }, 5000);
        }
        window.showError = (msg) => showToast(msg, 'error');
        window.showSuccess = (msg) => showToast(msg, 'success');
        window.showWarning = (msg) => showToast(msg, 'warning');
        window.showInfo = (msg) => showToast(msg, 'info');
        window.alert = (msg) => showToast(msg, 'info');

        window.showConfirm = function(message, title = 'Confirm') {
            return new Promise((resolve) => {
                const overlay = document.createElement('div');
                overlay.className = 'confirm-overlay';
                overlay.innerHTML = `<div class="confirm-dialog"><div class="confirm-header"><i class="bi bi-question-circle confirm-icon"></i><h3 class="confirm-title">${title}</h3></div><div class="confirm-body"><p>${message}</p></div><div class="confirm-footer"><button class="confirm-btn confirm-btn-cancel">Cancel</button><button class="confirm-btn confirm-btn-ok">OK</button></div></div>`;
                document.body.appendChild(overlay);
                const okBtn = overlay.querySelector('.confirm-btn-ok');
                const cancelBtn = overlay.querySelector('.confirm-btn-cancel');
                setTimeout(() => okBtn.focus(), 10);
                okBtn.onclick = () => { overlay.remove(); resolve(true); };
                cancelBtn.onclick = () => { overlay.remove(); resolve(false); };
                overlay.addEventListener('keydown', (e) => { if (e.key === 'Escape') { overlay.remove(); resolve(false); } else if (e.key === 'Enter') { overlay.remove(); resolve(true); } });
                overlay.addEventListener('click', (e) => { if (e.target === overlay) { overlay.remove(); resolve(false); } });
            });
        };
    </script>

    {% block extra_scripts %}{% endblock %}

    <script>
        (function() {
            let inactivityTimeout, warningTimeout;
            const INACTIVITY_LIMIT = 30 * 60 * 1000;
            const WARNING_TIME = 2 * 60 * 1000;
            let lastActivity = Date.now(), lastActivityReset = 0, warningShown = false;
            function logoutUser() { window.location.href = '/portal/logout?reason=inactivity'; }
            function showWarning() {
                if (warningShown) return; warningShown = true;
                let el = document.getElementById('inactivityWarning');
                if (!el) { el = document.createElement('div'); el.id = 'inactivityWarning'; el.style.cssText = 'position:fixed;top:0;left:0;right:0;background:#E53935;color:white;padding:12px 20px;text-align:center;z-index:99999;font-weight:500;'; el.innerHTML = '<i class="bi bi-exclamation-triangle"></i> You will be logged out in 2 minutes due to inactivity. <button onclick="window.resetInactivityTimer()" style="margin-left:15px;background:white;color:#E53935;border:none;padding:5px 15px;border-radius:4px;cursor:pointer;font-weight:600;">Stay Logged In</button>'; document.body.appendChild(el); }
                el.style.display = 'block';
            }
            function hideWarning() { const el = document.getElementById('inactivityWarning'); if (el) el.style.display = 'none'; warningShown = false; }
            function resetInactivityTimer() {
                const now = Date.now(); if (now - lastActivityReset < 1000) return; lastActivityReset = now; lastActivity = now;
                clearTimeout(inactivityTimeout); clearTimeout(warningTimeout); hideWarning();
                warningTimeout = setTimeout(showWarning, INACTIVITY_LIMIT - WARNING_TIME);
                inactivityTimeout = setTimeout(logoutUser, INACTIVITY_LIMIT);
            }
            window.resetInactivityTimer = resetInactivityTimer;
            ['mousedown','keydown','scroll','touchstart','click'].forEach(e => document.addEventListener(e, resetInactivityTimer, true));
            resetInactivityTimer();
            document.addEventListener('visibilitychange', function() { if (document.visibilityState === 'visible' && Date.now() - lastActivity >= INACTIVITY_LIMIT) logoutUser(); });
        })();
    </script>
</body>
</html>
