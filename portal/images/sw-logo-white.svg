<svg width="300" height="60" viewBox="0 0 300 60" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .logo-box {
        fill: none;
        stroke: #c9d1d9;
        stroke-width: 2;
      }
      .logo-text {
        font-family: 'Arial', 'Helvetica', sans-serif;
        font-size: 20px;
        font-weight: 400;
        fill: #c9d1d9;
        letter-spacing: 3px;
      }
    </style>
  </defs>
  <!-- Border box -->
  <rect x="5" y="15" width="290" height="30" rx="2" class="logo-box"/>
  <!-- Text -->
  <text x="150" y="37" text-anchor="middle" class="logo-text">SW HOSPITALITY GROUP</text>
</svg>
