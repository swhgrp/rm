{% extends "base.html" %}

{% block title %}Locations - HR Management{% endblock %}
{% block nav_locations %}active{% endblock %}

{% block content %}
<div class="card">
    <div class="card-header">
        <h2>Restaurant Locations</h2>
        <button class="btn btn-primary" onclick="showCreateModal()">+ Add Location</button>
    </div>

    <div class="table-wrapper">
        <table id="locationsTable">
            <thead>
                <tr>
                    <th>Name</th>
                    <th>Address</th>
                    <th>City, State</th>
                    <th>Phone</th>
                    <th>Manager</th>
                    <th>Status</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="locationsBody">
                <tr>
                    <td colspan="7" style="text-align: center; padding: 2rem;">Loading locations...</td>
                </tr>
            </tbody>
        </table>
    </div>
</div>

<!-- Create/Edit Location Modal -->
<div id="locationModal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h3 id="modalTitle">Add Location</h3>
            <span class="close" onclick="closeModal()">&times;</span>
        </div>
        <div class="modal-body">
            <form id="locationForm">
                <input type="hidden" id="locationId">

                <div class="form-group">
                    <label for="name">Location Name *</label>
                    <input type="text" id="name" required>
                </div>

                <div class="form-group">
                    <label for="address">Street Address</label>
                    <input type="text" id="address">
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="city">City</label>
                        <input type="text" id="city">
                    </div>
                    <div class="form-group">
                        <label for="state">State</label>
                        <input type="text" id="state" maxlength="2" placeholder="OR">
                    </div>
                    <div class="form-group">
                        <label for="zip_code">ZIP Code</label>
                        <input type="text" id="zip_code" maxlength="10">
                    </div>
                </div>

                <div class="form-group">
                    <label for="phone">Phone</label>
                    <input type="tel" id="phone">
                </div>

                <div class="form-group">
                    <label for="manager_name">Manager Name</label>
                    <input type="text" id="manager_name">
                </div>

                <div class="form-group">
                    <label>
                        <input type="checkbox" id="is_active" checked>
                        Active
                    </label>
                </div>
            </form>
        </div>
        <div class="modal-footer">
            <button type="button" class="btn btn-secondary" onclick="closeModal()">Cancel</button>
            <button type="button" class="btn btn-primary" onclick="saveLocation()">Save</button>
        </div>
    </div>
</div>

<style>
    .form-group {
        margin-bottom: 1rem;
    }
    .form-group label {
        display: block;
        margin-bottom: 0.5rem;
        color: #e0e0e0;
    }
    .form-group input[type="text"],
    .form-group input[type="tel"] {
        width: 100%;
        padding: 0.5rem;
        border: 1px solid #555;
        border-radius: 4px;
        background: #1a1a1a;
        color: #e0e0e0;
    }
    .form-row {
        display: grid;
        grid-template-columns: 2fr 1fr 1fr;
        gap: 1rem;
    }
    .modal {
        display: none;
        position: fixed;
        z-index: 1000;
        left: 0;
        top: 0;
        width: 100%;
        height: 100%;
        background: rgba(0,0,0,0.7);
    }
    .modal-content {
        background: #2d2d2d;
        margin: 5% auto;
        padding: 0;
        border: 1px solid #404040;
        border-radius: 8px;
        width: 90%;
        max-width: 600px;
        box-shadow: 0 4px 8px rgba(0,0,0,0.5);
    }
    .modal-header {
        padding: 1.5rem;
        border-bottom: 1px solid #404040;
        display: flex;
        justify-content: space-between;
        align-items: center;
    }
    .modal-header h3 {
        margin: 0;
        color: #fff;
    }
    .modal-body {
        padding: 1.5rem;
    }
    .modal-footer {
        padding: 1rem 1.5rem;
        border-top: 1px solid #404040;
        text-align: right;
    }
    .modal-footer button {
        margin-left: 0.5rem;
    }
    .close {
        color: #aaa;
        font-size: 28px;
        font-weight: bold;
        cursor: pointer;
    }
    .close:hover {
        color: #fff;
    }
    .status-badge {
        padding: 0.25rem 0.5rem;
        border-radius: 4px;
        font-size: 0.85rem;
    }
    .status-active {
        background: #27ae60;
        color: white;
    }
    .status-inactive {
        background: #666;
        color: white;
    }
</style>

<script>
let locations = [];

async function loadLocations() {
    try {
        const response = await fetch('/hr/api/locations/', {
            credentials: 'same-origin'
        });
        if (!response.ok) {
            const text = await response.text();
            console.error('Response:', text);
            throw new Error('Failed to load locations: ' + response.status);
        }

        locations = await response.json();
        renderLocations();
    } catch (error) {
        console.error('Error loading locations:', error);
        document.getElementById('locationsBody').innerHTML = `
            <tr><td colspan="7" style="text-align: center; color: #e74c3c;">Error loading locations: ${error.message}</td></tr>
        `;
    }
}

function renderLocations() {
    const tbody = document.getElementById('locationsBody');

    if (locations.length === 0) {
        tbody.innerHTML = '<tr><td colspan="7" style="text-align: center;">No locations found</td></tr>';
        return;
    }

    tbody.innerHTML = locations.map(location => `
        <tr>
            <td><strong>${escapeHtml(location.name)}</strong></td>
            <td>${escapeHtml(location.address || '')}</td>
            <td>${escapeHtml(location.city || '')}${location.state ? ', ' + location.state : ''}</td>
            <td>${escapeHtml(location.phone || '')}</td>
            <td>${escapeHtml(location.manager_name || '')}</td>
            <td>
                <span class="status-badge ${location.is_active ? 'status-active' : 'status-inactive'}">
                    ${location.is_active ? 'Active' : 'Inactive'}
                </span>
            </td>
            <td>
                <button class="btn btn-sm btn-secondary" onclick="editLocation(${location.id})">Edit</button>
                <button class="btn btn-sm btn-danger" onclick="deleteLocation(${location.id}, '${escapeHtml(location.name)}')">Delete</button>
            </td>
        </tr>
    `).join('');
}

function showCreateModal() {
    document.getElementById('modalTitle').textContent = 'Add Location';
    document.getElementById('locationForm').reset();
    document.getElementById('locationId').value = '';
    document.getElementById('is_active').checked = true;
    document.getElementById('locationModal').style.display = 'block';
}

function editLocation(id) {
    const location = locations.find(l => l.id === id);
    if (!location) return;

    document.getElementById('modalTitle').textContent = 'Edit Location';
    document.getElementById('locationId').value = location.id;
    document.getElementById('name').value = location.name;
    document.getElementById('address').value = location.address || '';
    document.getElementById('city').value = location.city || '';
    document.getElementById('state').value = location.state || '';
    document.getElementById('zip_code').value = location.zip_code || '';
    document.getElementById('phone').value = location.phone || '';
    document.getElementById('manager_name').value = location.manager_name || '';
    document.getElementById('is_active').checked = location.is_active;
    document.getElementById('locationModal').style.display = 'block';
}

function closeModal() {
    document.getElementById('locationModal').style.display = 'none';
}

async function saveLocation() {
    const locationId = document.getElementById('locationId').value;
    const data = {
        name: document.getElementById('name').value.trim(),
        address: document.getElementById('address').value.trim() || null,
        city: document.getElementById('city').value.trim() || null,
        state: document.getElementById('state').value.trim().toUpperCase() || null,
        zip_code: document.getElementById('zip_code').value.trim() || null,
        phone: document.getElementById('phone').value.trim() || null,
        manager_name: document.getElementById('manager_name').value.trim() || null,
        is_active: document.getElementById('is_active').checked
    };

    if (!data.name) {
        alert('Location name is required');
        return;
    }

    try {
        const url = locationId ? `/hr/api/locations/${locationId}` : '/hr/api/locations/';
        const method = locationId ? 'PUT' : 'POST';

        const response = await fetch(url, {
            method: method,
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(data)
        });

        if (!response.ok) {
            const error = await response.json();
            throw new Error(error.detail || 'Failed to save location');
        }

        closeModal();
        loadLocations();
    } catch (error) {
        alert('Error saving location: ' + error.message);
    }
}

async function deleteLocation(id, name) {
    if (!confirm(`Are you sure you want to delete "${name}"?`)) return;

    try {
        const response = await fetch(`/hr/api/locations/${id}`, {
            method: 'DELETE'
        });

        if (!response.ok) {
            const error = await response.json();
            throw new Error(error.detail || 'Failed to delete location');
        }

        loadLocations();
    } catch (error) {
        alert('Error deleting location: ' + error.message);
    }
}

function escapeHtml(text) {
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}

// Close modal when clicking outside
window.onclick = function(event) {
    const modal = document.getElementById('locationModal');
    if (event.target === modal) {
        closeModal();
    }
}

// Load locations on page load
loadLocations();
</script>
{% endblock %}
