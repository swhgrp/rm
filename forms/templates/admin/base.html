<!DOCTYPE html>
<html lang="en" data-bs-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Debug Mode Configuration -->
    <script>
        window.DEBUG_MODE = false;
        (function() {
            const originalLog = console.log;
            const originalWarn = console.warn;
            const originalInfo = console.info;
            const originalDebug = console.debug;

            console.log = function(...args) {
                if (window.DEBUG_MODE) originalLog.apply(console, args);
            };
            console.warn = function(...args) {
                if (window.DEBUG_MODE) originalWarn.apply(console, args);
            };
            console.info = function(...args) {
                if (window.DEBUG_MODE) originalInfo.apply(console, args);
            };
            console.debug = function(...args) {
                if (window.DEBUG_MODE) originalDebug.apply(console, args);
            };
        })();
    </script>

    <title>{% block title %}Forms{% endblock %} - SW Hospitality</title>

    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png">

    <!-- Bootstrap CSS -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.10.0/font/bootstrap-icons.min.css" rel="stylesheet">

    <style>
        /* =====================================================
           SW Hospitality Group - Slate Blue Light Theme
           Forms System
           ===================================================== */

        :root {
            --bg-primary: #ECEFF1;
            --bg-secondary: #FFFFFF;
            --bg-tertiary: #F5F5F5;
            --bg-elevated: #E0E0E0;
            --border-primary: #CFD8DC;
            --border-secondary: #B0BEC5;
            --text-primary: #263238;
            --text-secondary: #546E7A;
            --text-muted: #78909C;
            --accent-primary: #455A64;
            --accent-secondary: #37474F;
            --accent-hover: #263238;
            --shadow-sm: 0 1px 3px rgba(0, 0, 0, 0.12);
            --shadow-md: 0 2px 8px rgba(0, 0, 0, 0.15);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background-color: var(--bg-primary);
            color: var(--text-primary);
        }

        /* ========== SIDEBAR NAVIGATION ========== */
        .sidebar {
            position: fixed;
            top: 0;
            left: 0;
            height: 100vh;
            width: 200px;
            background-color: #455A64;
            padding-top: 20px;
            z-index: 1000;
            overflow-y: auto;
            border-right: none;
            transition: transform 0.3s ease-in-out;
            box-shadow: 2px 0 8px rgba(69, 90, 100, 0.25);
        }

        .sidebar-brand {
            padding: 20px 15px;
            text-align: center;
            color: #FFFFFF;
            font-size: 16px;
            font-weight: 600;
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
            margin-bottom: 10px;
        }

        .sidebar-brand img {
            max-width: 180px;
            height: auto;
            margin-bottom: 0px;
            filter: brightness(0) invert(1);
        }

        .sidebar-nav {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .sidebar-nav li {
            margin: 0;
        }

        .sidebar-nav a {
            display: block;
            padding: 12px 20px;
            color: rgba(255, 255, 255, 0.85);
            text-decoration: none;
            font-size: 14px;
            transition: all 0.2s;
        }

        .sidebar-nav i {
            margin-right: 10px;
            font-size: 16px;
            width: 20px;
            display: inline-block;
        }

        .sidebar-nav a:hover,
        .sidebar-nav a.active {
            background-color: rgba(255, 255, 255, 0.15);
            color: #FFFFFF;
            border-left: 3px solid #FFFFFF;
            padding-left: 17px;
        }

        /* Mobile Toggle Button */
        .sidebar-toggle {
            display: none;
            position: fixed;
            top: 15px;
            left: 15px;
            z-index: 1001;
            background-color: #455A64;
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: #FFFFFF;
            padding: 8px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 20px;
        }

        .sidebar-toggle:hover {
            background-color: #37474F;
            color: #FFFFFF;
        }

        /* Mobile Overlay */
        .sidebar-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
            z-index: 999;
        }

        .sidebar-overlay.active {
            display: block;
        }

        /* ========== MAIN CONTENT AREA ========== */
        .main-wrapper {
            margin-left: 200px;
            min-height: 100vh;
            transition: margin-left 0.3s ease-in-out;
        }

        /* Top Navbar */
        .top-navbar {
            background-color: var(--bg-secondary);
            border-bottom: 1px solid var(--border-primary);
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: var(--shadow-sm);
        }

        .page-title {
            font-size: 18px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .page-title i {
            color: var(--accent-primary);
        }

        .user-menu-top {
            display: flex;
            align-items: center;
            gap: 15px;
            position: relative;
        }

        .user-menu-top .dropdown-toggle {
            background: none;
            border: none;
            color: var(--text-primary);
            font-size: 20px;
            cursor: pointer;
            padding: 5px 10px;
        }

        .user-menu-top .dropdown-toggle:hover {
            color: var(--accent-primary);
        }

        /* Override Bootstrap dropdown styling */
        .dropdown-menu {
            background-color: var(--bg-secondary);
            border: 1px solid var(--border-primary);
            box-shadow: var(--shadow-md);
        }

        .dropdown-item {
            display: block;
            color: var(--text-primary);
            padding: 8px 16px;
            text-decoration: none;
            transition: all 0.2s;
        }

        .dropdown-item:hover {
            background-color: var(--bg-tertiary);
            color: var(--accent-primary);
        }

        .dropdown-item i {
            margin-right: 8px;
        }

        .dropdown-header {
            color: var(--text-primary);
            padding: 8px 16px;
            font-size: 14px;
            font-weight: 600;
        }

        .dropdown-divider {
            height: 1px;
            background-color: var(--border-primary);
            margin: 5px 0;
            border: 0;
        }

        /* Content Container */
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 30px;
        }

        /* Base heading styles */
        h2 {
            font-size: 1.75rem;
            font-weight: 600;
            color: var(--text-primary);
        }

        /* ========== CARDS ========== */
        .card {
            background-color: var(--bg-secondary);
            border: 1px solid var(--border-primary);
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: var(--shadow-md);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            background-color: var(--bg-tertiary);
            border-bottom: 1px solid var(--border-primary);
        }

        .card-header h2 {
            font-size: 18px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .card-header h2 i {
            margin-right: 10px;
            color: var(--accent-primary);
        }

        /* ========== STAT CARDS ========== */
        .stat-card {
            border-radius: 8px;
            padding: 20px;
            color: white;
            position: relative;
            overflow: hidden;
        }

        .stat-card h6 {
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 5px;
            opacity: 0.9;
        }

        .stat-card h2 {
            font-size: 2rem;
            font-weight: 700;
            margin: 0;
            color: white;
        }

        .stat-card .stat-icon {
            position: absolute;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 3rem;
            opacity: 0.3;
        }

        .stat-card.bg-primary { background: linear-gradient(135deg, #1976D2, #1565C0); }
        .stat-card.bg-warning { background: linear-gradient(135deg, #F9A825, #F57F17); }
        .stat-card.bg-info { background: linear-gradient(135deg, #00ACC1, #00838F); }
        .stat-card.bg-success { background: linear-gradient(135deg, #43A047, #2E7D32); }

        /* ========== BUTTONS ========== */
        .btn {
            padding: 8px 16px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
            text-decoration: none;
            display: inline-block;
        }

        .btn-primary {
            background: var(--accent-primary);
            color: #fff;
        }

        .btn-primary:hover {
            background: var(--accent-hover);
        }

        .btn-success {
            background: #43A047;
            color: #fff;
        }

        .btn-success:hover {
            background: #388E3C;
        }

        .btn-danger {
            background: #E53935;
            color: #fff;
        }

        .btn-danger:hover {
            background: #C62828;
        }

        .btn-secondary {
            background: var(--bg-tertiary);
            color: var(--text-primary);
            border: 1px solid var(--border-primary);
        }

        .btn-secondary:hover {
            background: var(--bg-elevated);
            border-color: var(--accent-primary);
            color: var(--accent-primary);
        }

        .btn-outline-primary {
            background: transparent;
            color: var(--accent-primary);
            border: 1px solid var(--accent-primary);
        }

        .btn-outline-primary:hover {
            background: var(--accent-primary);
            color: #fff;
        }

        /* ========== TABLES ========== */
        .table-wrapper {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            text-align: left;
            padding: 12px;
            background-color: var(--bg-tertiary);
            color: var(--text-primary);
            font-weight: 600;
            font-size: 12px;
            text-transform: uppercase;
            border-bottom: 1px solid var(--border-primary);
        }

        td {
            padding: 12px;
            border-bottom: 1px solid var(--border-primary);
            color: var(--text-primary);
        }

        tr:hover {
            background-color: #CFD8DC;
        }

        /* ========== BADGES ========== */
        .badge {
            padding: 4px 8px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 600;
        }

        .badge-success, .badge.bg-success {
            background: #43A047;
            color: #fff;
        }

        .badge-danger, .badge.bg-danger {
            background: #E53935;
            color: #fff;
        }

        .badge-warning, .badge.bg-warning {
            background: #FB8C00;
            color: #fff;
        }

        .badge-info, .badge.bg-info {
            background: #1E88E5;
            color: #fff;
        }

        .badge-secondary, .badge.bg-secondary {
            background: #78909C;
            color: #fff;
        }

        /* ========== LIST GROUPS ========== */
        .list-group {
            border-radius: 8px;
            overflow: hidden;
        }

        .list-group-item {
            background-color: var(--bg-secondary);
            border: 1px solid var(--border-primary);
            color: var(--text-primary);
            padding: 12px 16px;
        }

        .list-group-item:hover {
            background-color: var(--bg-tertiary);
        }

        .list-group-item-action {
            text-decoration: none;
        }

        .list-group-item-action:hover {
            color: var(--accent-primary);
        }

        /* ========== ALERTS ========== */
        .alert {
            border-radius: 8px;
            padding: 15px 20px;
            margin-bottom: 20px;
            border: 1px solid;
        }

        .alert-warning {
            background-color: #FFF8E1;
            border-color: #FFE082;
            color: #F57F17;
        }

        .alert-info {
            background-color: #E1F5FE;
            border-color: #81D4FA;
            color: #0277BD;
        }

        /* ========== FORM ELEMENTS ========== */
        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            color: var(--text-secondary);
            font-size: 14px;
        }

        .form-group input[type="text"],
        .form-group input[type="email"],
        .form-group input[type="password"],
        .form-group input[type="tel"],
        .form-group input[type="date"],
        .form-group input[type="number"],
        .form-group select,
        .form-group textarea,
        .form-control {
            width: 100%;
            padding: 8px 12px;
            border: 1px solid var(--border-primary);
            border-radius: 4px;
            background: var(--bg-primary);
            color: var(--text-primary);
            font-size: 14px;
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus,
        .form-control:focus {
            outline: none;
            border-color: var(--accent-primary);
            box-shadow: 0 0 0 3px rgba(69, 90, 100, 0.15);
        }

        /* ========== MOBILE RESPONSIVE ========== */
        @media (max-width: 768px) {
            .sidebar {
                transform: translateX(-200px);
            }

            .sidebar.active {
                transform: translateX(0);
            }

            .sidebar-toggle {
                display: block;
            }

            .main-wrapper {
                margin-left: 0;
            }

            .top-navbar {
                padding-left: 60px;
                padding-right: 10px;
                justify-content: flex-end !important;
            }

            .top-navbar h1 {
                display: none;
            }

            .user-menu-top {
                display: flex !important;
                margin-left: auto !important;
            }

            .dropdown-menu[data-popper-placement],
            .dropdown-menu[style*="position"],
            .dropdown-menu {
                position: fixed !important;
                left: auto !important;
                right: 10px !important;
                top: 55px !important;
                transform: none !important;
                margin: 0 !important;
            }

            .hide-mobile {
                display: none;
            }

            .container {
                padding: 15px !important;
            }

            table {
                display: block;
                overflow-x: auto;
                -webkit-overflow-scrolling: touch;
                white-space: nowrap;
                font-size: 13px;
            }

            .btn,
            button {
                min-height: 44px !important;
                padding: 10px 16px !important;
            }

            .row {
                flex-direction: column !important;
            }

            [class*="col-"] {
                width: 100% !important;
                max-width: 100% !important;
                margin-bottom: 15px;
            }
        }

        {% block extra_styles %}{% endblock %}
    </style>
</head>
<body>
    <!-- Mobile Sidebar Toggle -->
    <button class="sidebar-toggle" onclick="toggleSidebar()">
        <i class="bi bi-list"></i>
    </button>

    <!-- Sidebar Overlay (mobile) -->
    <div class="sidebar-overlay" onclick="toggleSidebar()"></div>

    <!-- Sidebar Navigation -->
    <div class="sidebar" id="sidebar">
        <div class="sidebar-brand">
            <img src="/hr/static/images/sw-logo.png" alt="SW Hospitality Group">
        </div>
        <ul class="sidebar-nav">
            <li><a href="/" title="Return to Portal"><i class="bi bi-house-door"></i> Portal Home</a></li>
            <li><a href="/forms/" class="{% block nav_dashboard %}{% endblock %}"><i class="bi bi-speedometer2"></i> Dashboard</a></li>
            <li><a href="/forms/submissions" class="{% block nav_submissions %}{% endblock %}"><i class="bi bi-inbox"></i> Submissions</a></li>
            <li><a href="/forms/templates" class="{% block nav_templates %}{% endblock %}"><i class="bi bi-file-earmark-plus"></i> Templates</a></li>
            <li><a href="/forms/reports" class="{% block nav_reports %}{% endblock %}"><i class="bi bi-graph-up"></i> Reports</a></li>
            <li><a href="/forms/settings" class="{% block nav_settings %}{% endblock %}"><i class="bi bi-gear"></i> Settings</a></li>
        </ul>
    </div>

    <!-- Main Content Wrapper -->
    <div class="main-wrapper">
        <!-- Top Navbar -->
        <div class="top-navbar">
            <div class="page-title">
                <i class="bi bi-file-earmark-text"></i> Forms System
            </div>
            <div class="user-menu-top">
                <div class="dropdown">
                    <button class="dropdown-toggle" type="button" id="userDropdown" data-bs-toggle="dropdown" aria-expanded="false">
                        <i class="bi bi-person-circle"></i>
                    </button>
                    <ul class="dropdown-menu dropdown-menu-end" aria-labelledby="userDropdown">
                        <li><h6 class="dropdown-header" id="userNameHeader">User</h6></li>
                        <li><hr class="dropdown-divider"></li>
                        <li><a class="dropdown-item" href="/portal/">
                            <i class="bi bi-house"></i> Portal Home
                        </a></li>
                        <li><hr class="dropdown-divider"></li>
                        <li><a class="dropdown-item" href="/portal/logout">
                            <i class="bi bi-box-arrow-right"></i> Logout
                        </a></li>
                    </ul>
                </div>
            </div>
        </div>

        <!-- Main Content -->
        <div class="container">
            {% block content %}{% endblock %}
        </div>
    </div>

    <!-- Notification Modal -->
    <div id="notificationModal" class="modal fade" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="notificationTitle">Forms System</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body" id="notificationMessage"></div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-primary" data-bs-dismiss="modal">OK</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Confirm Modal -->
    <div id="confirmModal" class="modal fade" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="confirmTitle">Confirm Action</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body" id="confirmMessage"></div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" id="confirmCancelBtn">Cancel</button>
                    <button type="button" class="btn btn-primary" id="confirmOkBtn">OK</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Toggle Sidebar (Mobile)
        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.querySelector('.sidebar-overlay');

            sidebar.classList.toggle('active');
            overlay.classList.toggle('active');
        }

        // Auto-logout after 30 minutes of inactivity
        (function() {
            let inactivityTimeout;
            const INACTIVITY_LIMIT = 30 * 60 * 1000;
            let lastActivity = Date.now();
            let lastActivityReset = 0;

            function logoutUser() {
                window.location.href = '/portal/logout';
            }

            function resetInactivityTimer() {
                const now = Date.now();
                if (now - lastActivityReset < 1000) return;
                lastActivityReset = now;
                lastActivity = now;
                clearTimeout(inactivityTimeout);
                inactivityTimeout = setTimeout(logoutUser, INACTIVITY_LIMIT);
            }

            const activityEvents = ['mousedown', 'keydown', 'scroll', 'touchstart', 'click'];
            activityEvents.forEach(function(eventName) {
                document.addEventListener(eventName, resetInactivityTimer, true);
            });

            resetInactivityTimer();

            document.addEventListener('visibilitychange', function() {
                if (document.visibilityState === 'visible') {
                    const timeSinceActivity = Date.now() - lastActivity;
                    if (timeSinceActivity >= INACTIVITY_LIMIT) {
                        logoutUser();
                    }
                }
            });

            window.addEventListener('focus', function() {
                const timeSinceActivity = Date.now() - lastActivity;
                if (timeSinceActivity >= INACTIVITY_LIMIT) {
                    logoutUser();
                }
            });
        })();

        // Custom notification function
        function showNotification(message, title = 'Forms System') {
            document.getElementById('notificationTitle').textContent = title;
            document.getElementById('notificationMessage').textContent = message;
            const modal = new bootstrap.Modal(document.getElementById('notificationModal'));
            modal.show();
        }

        window.alert = showNotification;

        // Custom confirm function
        function showConfirm(message, title = 'Confirm Action') {
            return new Promise((resolve) => {
                document.getElementById('confirmTitle').textContent = title;
                document.getElementById('confirmMessage').textContent = message;

                const modalElement = document.getElementById('confirmModal');
                const modal = new bootstrap.Modal(modalElement);

                let resolved = false;

                const okBtn = document.getElementById('confirmOkBtn');
                const cancelBtn = document.getElementById('confirmCancelBtn');

                okBtn.onclick = function() {
                    if (!resolved) {
                        resolved = true;
                        modal.hide();
                        setTimeout(() => resolve(true), 100);
                    }
                };

                cancelBtn.onclick = function() {
                    if (!resolved) {
                        resolved = true;
                        modal.hide();
                        setTimeout(() => resolve(false), 100);
                    }
                };

                modalElement.addEventListener('hidden.bs.modal', function handler() {
                    modalElement.removeEventListener('hidden.bs.modal', handler);
                    if (!resolved) {
                        resolved = true;
                        setTimeout(() => resolve(false), 100);
                    }
                }, { once: true });

                modal.show();
            });
        }

        // Close sidebar on mobile when clicking links
        document.addEventListener('DOMContentLoaded', function() {
            if (window.innerWidth <= 768) {
                const sidebarLinks = document.querySelectorAll('.sidebar-nav a');
                sidebarLinks.forEach(link => {
                    link.addEventListener('click', function() {
                        const sidebar = document.getElementById('sidebar');
                        const overlay = document.querySelector('.sidebar-overlay');
                        sidebar.classList.remove('active');
                        overlay.classList.remove('active');
                    });
                });
            }
        });
    </script>

    <!-- Bootstrap Bundle with Popper -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/js/bootstrap.bundle.min.js"></script>

    {% block extra_scripts %}{% endblock %}
</body>
</html>
