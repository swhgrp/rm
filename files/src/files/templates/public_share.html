<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shared Files</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #0d1117;
            color: #c9d1d9;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .navbar-custom {
            background-color: #161b22;
            border-bottom: 1px solid #30363d;
            padding: 15px 30px;
        }

        .content-wrapper {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 30px;
        }

        .share-container {
            max-width: 800px;
            width: 100%;
            background-color: #161b22;
            border: 1px solid #30363d;
            border-radius: 8px;
            padding: 40px;
        }

        .share-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .share-icon {
            font-size: 64px;
            color: #58a6ff;
            margin-bottom: 20px;
        }

        .file-list {
            background-color: #0d1117;
            border: 1px solid #30363d;
            border-radius: 6px;
            padding: 20px;
            margin-top: 20px;
        }

        .file-item {
            padding: 12px 15px;
            border-bottom: 1px solid #30363d;
            display: flex;
            align-items: center;
            gap: 12px;
            transition: background 0.2s;
        }

        .file-item:hover {
            background-color: #21262d;
        }

        .file-item:last-child {
            border-bottom: none;
        }

        .file-icon {
            font-size: 24px;
            color: #58a6ff;
        }

        .file-name {
            flex: 1;
            font-weight: 500;
        }

        .file-size {
            font-size: 14px;
            color: #8b949e;
        }

        .btn-custom {
            background-color: #21262d;
            color: #c9d1d9;
            border: 1px solid #30363d;
            padding: 8px 16px;
            border-radius: 6px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: background 0.2s;
            text-decoration: none;
        }

        .btn-custom:hover {
            background-color: #30363d;
            color: #c9d1d9;
        }

        .btn-primary-custom {
            background-color: #58a6ff;
            color: white;
            border: none;
        }

        .btn-primary-custom:hover {
            background-color: #79c0ff;
            color: white;
        }

        .form-control {
            background-color: #0d1117;
            border: 1px solid #30363d;
            color: #c9d1d9;
        }

        .form-control:focus {
            background-color: #0d1117;
            border-color: #58a6ff;
            color: #c9d1d9;
            box-shadow: 0 0 0 0.2rem rgba(88, 166, 255, 0.25);
        }

        .alert-info {
            background-color: #161b22;
            border-color: #30363d;
            color: #c9d1d9;
        }

        .modal-content {
            background-color: #161b22;
            border: 1px solid #30363d;
        }

        .modal-header {
            border-bottom: 1px solid #30363d;
        }

        .breadcrumb {
            background-color: transparent;
            padding: 10px 0;
            margin-bottom: 20px;
        }

        .breadcrumb-item {
            color: #8b949e;
        }

        .breadcrumb-item.active {
            color: #c9d1d9;
        }

        .breadcrumb-item a {
            color: #58a6ff;
            text-decoration: none;
        }

        .breadcrumb-item a:hover {
            color: #79c0ff;
        }

        .folder-item {
            padding: 12px 15px;
            border-bottom: 1px solid #30363d;
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .folder-item:hover {
            background-color: #21262d;
        }

        .folder-item:last-child {
            border-bottom: none;
        }

        .folder-icon {
            font-size: 24px;
            color: #58a6ff;
        }

        .folder-name {
            flex: 1;
            font-weight: 500;
        }

        /* Mobile Responsive Styles */
        @media (max-width: 768px) {
            .navbar-custom {
                padding: 15px;
            }

            .content-wrapper {
                padding: 15px;
            }

            .share-container {
                padding: 20px;
            }

            .share-icon {
                font-size: 48px;
                margin-bottom: 15px;
            }

            .share-header h2 {
                font-size: 1.5rem;
            }

            .btn {
                width: 100%;
                margin-bottom: 10px;
            }

            .form-control {
                font-size: 16px;
                padding: 12px;
            }

            .file-item, .folder-item {
                flex-wrap: wrap;
                padding: 12px 10px;
                gap: 8px;
            }

            .file-icon, .folder-icon {
                font-size: 20px;
            }

            .file-name, .folder-name {
                flex: 1 1 100%;
                font-size: 14px;
            }

            .file-size {
                font-size: 12px;
            }

            .alert {
                font-size: 14px;
                padding: 12px;
            }
        }

        /* Touch-friendly improvements */
        @media (hover: none) and (pointer: coarse) {
            .btn,
            .file-item,
            .folder-item {
                min-height: 44px;
            }
        }
    </style>
</head>
<body>
    <nav class="navbar-custom">
        <div class="container">
            <h1 class="h4 mb-0 d-flex align-items-center gap-2">
                <i class="bi bi-share"></i>
                Shared Files
            </h1>
        </div>
    </nav>

    <div class="content-wrapper">
        <div class="share-container">
            <div class="share-header">
                <div class="share-icon">
                    <i class="bi bi-folder-symlink"></i>
                </div>
                <h2 id="shareTitle">Loading shared content...</h2>
                <p class="text-muted" id="shareDescription"></p>
            </div>

            <!-- Password prompt (if needed) -->
            <div id="passwordPrompt" style="display: none;">
                <div class="alert alert-info">
                    <i class="bi bi-lock"></i> This share is password protected
                </div>
                <div class="mb-3">
                    <label for="sharePassword" class="form-label">Enter Password</label>
                    <input type="password" class="form-control" id="sharePassword" placeholder="Password">
                </div>
                <button class="btn btn-primary-custom w-100" onclick="verifyPassword()">
                    <i class="bi bi-unlock"></i> Unlock
                </button>
            </div>

            <!-- Breadcrumb navigation -->
            <nav aria-label="breadcrumb" id="breadcrumbNav" style="display: none;">
                <ol class="breadcrumb" id="breadcrumb"></ol>
            </nav>

            <!-- File/Folder list -->
            <div id="contentArea" style="display: none;">
                <div class="file-list" id="fileList">
                    <!-- Content will be loaded here -->
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Custom notification function
        function showNotification(message) {
            const overlay = document.createElement('div');
            overlay.style.cssText = 'position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.5);display:flex;align-items:center;justify-content:center;z-index:10000;';
            const modal = document.createElement('div');
            modal.style.cssText = 'background:#fff;padding:24px;border-radius:8px;max-width:400px;text-align:center;';
            modal.innerHTML = `<p style="margin:0 0 16px 0;">${message}</p><button style="background:#455A64;color:#fff;border:none;padding:8px 24px;border-radius:4px;cursor:pointer;">OK</button>`;
            modal.querySelector('button').onclick = () => document.body.removeChild(overlay);
            overlay.appendChild(modal);
            document.body.appendChild(overlay);
        }
        window.alert = showNotification;

        const shareToken = window.location.pathname.split('/').pop();
        let shareData = null;
        let currentFolderId = null;
        let folderStack = [];

        async function loadShare() {
            try {
                const response = await fetch(`/files/api/shares/access/${shareToken}`);

                if (response.status === 401) {
                    // Password required
                    document.getElementById('passwordPrompt').style.display = 'block';
                    document.getElementById('shareTitle').textContent = 'Password Required';
                    document.getElementById('shareDescription').textContent = 'Please enter the password to access this shared content';
                    return;
                }

                if (!response.ok) {
                    throw new Error('Share not found or expired');
                }

                shareData = await response.json();
                displayShare();
            } catch (error) {
                console.error('Error loading share:', error);
                document.getElementById('shareTitle').textContent = 'Error';
                document.getElementById('shareDescription').textContent = 'This share link is invalid, expired, or has been removed.';
            }
        }

        async function verifyPassword() {
            const password = document.getElementById('sharePassword').value;

            if (!password) {
                alert('Please enter a password');
                return;
            }

            try {
                const response = await fetch(`/files/api/shares/access/${shareToken}`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({password: password})
                });

                if (response.ok) {
                    shareData = await response.json();
                    document.getElementById('passwordPrompt').style.display = 'none';
                    displayShare();
                } else {
                    alert('Incorrect password');
                    document.getElementById('sharePassword').value = '';
                }
            } catch (error) {
                console.error('Error verifying password:', error);
                alert('Failed to verify password');
            }
        }

        function displayShare() {
            if (shareData.resource_type === 'file') {
                // Single file share
                document.getElementById('shareTitle').textContent = shareData.file.name;
                document.getElementById('shareDescription').textContent = 'Shared file';

                const contentArea = document.getElementById('contentArea');
                contentArea.style.display = 'block';

                const fileList = document.getElementById('fileList');
                fileList.innerHTML = `
                    <div class="file-item">
                        <i class="bi bi-file-earmark file-icon"></i>
                        <span class="file-name">${shareData.file.name}</span>
                        <span class="file-size">${formatBytes(shareData.file.size)}</span>
                        ${shareData.can_download ? `
                            <a href="/files/api/shares/access/${shareToken}/download" class="btn btn-sm btn-primary-custom">
                                <i class="bi bi-download"></i> Download
                            </a>
                        ` : ''}
                    </div>
                `;
            } else {
                // Folder share
                document.getElementById('shareTitle').textContent = shareData.folder.name;
                document.getElementById('shareDescription').textContent = 'Shared folder';

                currentFolderId = shareData.folder.id;
                loadFolderContents(shareData.folder.id, shareData.folder.name);
            }
        }

        async function loadFolderContents(folderId, folderName) {
            try {
                const response = await fetch(`/files/api/shares/access/${shareToken}/browse/${folderId}`);

                if (!response.ok) {
                    throw new Error('Failed to load folder contents');
                }

                const data = await response.json();

                document.getElementById('contentArea').style.display = 'block';
                document.getElementById('breadcrumbNav').style.display = 'block';

                displayContents(data.folders || [], data.files || []);
                updateBreadcrumb();
            } catch (error) {
                console.error('Error loading folder:', error);
                alert('Failed to load folder contents');
            }
        }

        function displayContents(folders, files) {
            const fileList = document.getElementById('fileList');
            let html = '';

            if (folders.length === 0 && files.length === 0) {
                html = '<div class="text-center text-muted py-5"><i class="bi bi-inbox"></i><p class="mt-2">This folder is empty</p></div>';
            } else {
                // Display folders
                folders.forEach(folder => {
                    html += `
                        <div class="folder-item" onclick="navigateToFolder(${folder.id}, '${folder.name}')">
                            <i class="bi bi-folder folder-icon"></i>
                            <span class="folder-name">${folder.name}</span>
                        </div>
                    `;
                });

                // Display files
                files.forEach(file => {
                    html += `
                        <div class="file-item">
                            <i class="bi bi-file-earmark file-icon"></i>
                            <span class="file-name">${file.name}</span>
                            <span class="file-size">${formatBytes(file.size)}</span>
                            ${shareData.can_download ? `
                                <a href="/files/api/shares/access/${shareToken}/download/${file.id}" class="btn btn-sm btn-custom">
                                    <i class="bi bi-download"></i>
                                </a>
                            ` : ''}
                        </div>
                    `;
                });
            }

            fileList.innerHTML = html;
        }

        function navigateToFolder(folderId, folderName) {
            folderStack.push({id: currentFolderId, name: document.getElementById('shareTitle').textContent});
            currentFolderId = folderId;
            loadFolderContents(folderId, folderName);
        }

        function navigateBack(index) {
            if (index === 0) {
                // Back to root
                currentFolderId = shareData.folder.id;
                folderStack = [];
                loadFolderContents(shareData.folder.id, shareData.folder.name);
            } else {
                const target = folderStack[index - 1];
                folderStack = folderStack.slice(0, index);
                currentFolderId = target.id;
                loadFolderContents(target.id, target.name);
            }
        }

        function updateBreadcrumb() {
            const breadcrumb = document.getElementById('breadcrumb');
            let html = `<li class="breadcrumb-item"><a href="#" onclick="navigateBack(0); return false;">${shareData.folder.name}</a></li>`;

            folderStack.forEach((item, index) => {
                if (index === folderStack.length - 1) {
                    html += `<li class="breadcrumb-item active">${item.name}</li>`;
                } else {
                    html += `<li class="breadcrumb-item"><a href="#" onclick="navigateBack(${index + 1}); return false;">${item.name}</a></li>`;
                }
            });

            breadcrumb.innerHTML = html;
        }

        function formatBytes(bytes) {
            if (bytes === 0) return '0 Bytes';
            const k = 1024;
            const sizes = ['Bytes', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return Math.round(bytes / Math.pow(k, i) * 100) / 100 + ' ' + sizes[i];
        }

        // Load share on page load
        document.addEventListener('DOMContentLoaded', () => {
            loadShare();
        });
    </script>
</body>
</html>
