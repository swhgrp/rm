<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document Editor - Files</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }
        #editor {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            width: 100%;
            height: 100%;
        }
        #editor iframe {
            width: 100% !important;
            height: 100% !important;
        }
    </style>
</head>
<body>
    <div id="editor"></div>

    <script src="/onlyoffice/web-apps/apps/api/documents/api.js"></script>
    <script>
        // Get file ID from URL
        const urlParams = new URLSearchParams(window.location.search);
        const fileId = urlParams.get('fileId');

        if (!fileId) {
            alert('No file ID provided');
        } else {
            // Fetch editor configuration from backend
            fetch(`/files/api/files/${fileId}/editor-config`)
                .then(response => response.json())
                .then(config => {
                    console.log('OnlyOffice config:', config);
                    // Initialize OnlyOffice editor
                    const docEditor = new DocsAPI.DocEditor("editor", config);
                    console.log('OnlyOffice editor initialized:', docEditor);
                })
                .catch(error => {
                    console.error('Error loading editor configuration:', error);
                    alert('Failed to load document editor: ' + error.message);
                });
        }
    </script>
</body>
</html>
