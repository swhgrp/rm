<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Files Management</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background-color: #0d1117;
            color: #c9d1d9;
            min-height: 100vh;
        }

        /* Base heading styles */
        h2 {
            font-size: 1.75rem;  /* ~28px, matches other systems */
            font-weight: 600;
            color: #c9d1d9;
        }

        .navbar {
            background-color: #161b22;
            border-bottom: 1px solid #30363d;
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .navbar-brand {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .navbar-brand h1 {
            font-size: 20px;
            font-weight: 600;
            color: #c9d1d9;
            margin: 0;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .navbar-user {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .user-name {
            font-weight: 600;
            font-size: 14px;
            color: #c9d1d9;
        }

        /* Mobile responsive styles */
        @media (max-width: 768px) {
            .navbar {
                padding: 10px 15px;
            }

            .navbar-brand h1 {
                font-size: 16px;
                gap: 8px;
            }

            .navbar-brand h1 i {
                font-size: 18px;
            }

            .user-name {
                display: none;
            }

            .navbar-user {
                gap: 10px;
            }

            .btn-back {
                padding: 6px 12px;
                font-size: 13px;
            }
        }

        @media (max-width: 480px) {
            .navbar-brand h1 span {
                display: none;
            }

            .btn-back {
                padding: 6px 10px;
                font-size: 12px;
            }
        }

        .btn-back {
            padding: 8px 16px;
            background-color: #21262d;
            color: #c9d1d9;
            border: 1px solid #30363d;
            border-radius: 6px;
            text-decoration: none;
            font-size: 14px;
            transition: background 0.2s;
        }

        .btn-back:hover {
            background-color: #30363d;
            color: #c9d1d9;
        }

        .file-container {
            height: calc(100vh - 61px);
            width: 100%;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
            background: #0d1117;
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="navbar-brand">
            <h1><i class="bi bi-folder2"></i> <span>Files System</span></h1>
        </div>
        <div class="navbar-user">
            <span class="user-name">{{ user.full_name }}</span>
            <a href="/portal/" class="btn-back">Back to Portal</a>
        </div>
    </nav>

    <div class="file-container">
        <iframe src="/filebrowser/" title="File Browser"></iframe>
    </div>
</body>
</html>
