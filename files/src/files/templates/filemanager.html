<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Files Management</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #0d1117;
            color: #c9d1d9;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
        }

        .navbar-custom {
            background-color: #161b22;
            border-bottom: 1px solid #30363d;
        }

        .sidebar {
            background-color: #161b22;
            border-right: 1px solid #30363d;
            min-height: calc(100vh - 56px);
            padding: 20px;
        }

        .sidebar-item {
            padding: 10px 15px;
            margin-bottom: 5px;
            border-radius: 6px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            color: #c9d1d9;
            text-decoration: none;
            transition: background 0.2s;
        }

        .sidebar-item:hover {
            background-color: #21262d;
            color: #c9d1d9;
        }

        .main-content {
            padding: 30px;
        }

        .toolbar {
            background-color: #161b22;
            border: 1px solid #30363d;
            border-radius: 6px;
            padding: 15px;
            margin-bottom: 20px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .btn-custom {
            background-color: #21262d;
            color: #c9d1d9;
            border: 1px solid #30363d;
            padding: 8px 16px;
            border-radius: 6px;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: background 0.2s;
        }

        .btn-custom:hover {
            background-color: #30363d;
            color: #c9d1d9;
        }

        .btn-primary-custom {
            background-color: #58a6ff;
            color: white;
            border: none;
        }

        .btn-primary-custom:hover {
            background-color: #79c0ff;
            color: white;
        }

        .file-list {
            background-color: #161b22;
            border: 1px solid #30363d;
            border-radius: 6px;
            padding: 20px;
        }

        .file-item, .folder-item {
            padding: 12px 15px;
            border-bottom: 1px solid #30363d;
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .file-item:hover, .folder-item:hover {
            background-color: #21262d;
        }

        .file-item:last-child, .folder-item:last-child {
            border-bottom: none;
        }

        .file-icon, .folder-icon {
            font-size: 24px;
            color: #58a6ff;
        }

        .file-name, .folder-name {
            flex: 1;
            font-weight: 500;
        }

        .file-size, .file-date {
            font-size: 14px;
            color: #8b949e;
        }

        .breadcrumb-custom {
            background-color: transparent;
            padding: 0;
            margin-bottom: 20px;
        }

        .breadcrumb-custom .breadcrumb-item {
            color: #8b949e;
        }

        .breadcrumb-custom .breadcrumb-item.active {
            color: #c9d1d9;
        }

        .breadcrumb-custom .breadcrumb-item a {
            color: #58a6ff;
            text-decoration: none;
        }

        .breadcrumb-custom .breadcrumb-item a:hover {
            color: #79c0ff;
        }

        .modal-content {
            background-color: #161b22;
            border: 1px solid #30363d;
        }

        .modal-header {
            border-bottom: 1px solid #30363d;
        }

        .modal-footer {
            border-top: 1px solid #30363d;
        }

        .form-control {
            background-color: #0d1117;
            border: 1px solid #30363d;
            color: #c9d1d9;
        }

        .form-control:focus {
            background-color: #0d1117;
            border-color: #58a6ff;
            color: #c9d1d9;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #8b949e;
        }

        .empty-state i {
            font-size: 64px;
            margin-bottom: 20px;
            opacity: 0.5;
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-custom">
        <div class="container-fluid">
            <a class="navbar-brand d-flex align-items-center gap-2" href="#">
                <i class="bi bi-folder"></i>
                Files Management
            </a>
            <div class="d-flex align-items-center gap-3">
                <span class="text-light">{{ user.full_name }}</span>
                <a href="/portal/" class="btn btn-custom">Back to Portal</a>
            </div>
        </div>
    </nav>

    <div class="container-fluid">
        <div class="row">
            <div class="col-md-2 sidebar">
                <a href="#" class="sidebar-item" onclick="loadRootFolders(); return false;">
                    <i class="bi bi-house-door"></i>
                    <span>Home</span>
                </a>
                <a href="#" class="sidebar-item" onclick="loadMyFiles(); return false;">
                    <i class="bi bi-folder"></i>
                    <span>My Files</span>
                </a>
                <a href="#" class="sidebar-item" onclick="showNewFolderModal(); return false;">
                    <i class="bi bi-folder-plus"></i>
                    <span>New Folder</span>
                </a>
                <a href="#" class="sidebar-item" onclick="showUploadModal(); return false;">
                    <i class="bi bi-file-earmark-plus"></i>
                    <span>Upload File</span>
                </a>
            </div>

            <div class="col-md-10 main-content">
                <nav aria-label="breadcrumb">
                    <ol class="breadcrumb breadcrumb-custom" id="breadcrumb">
                        <li class="breadcrumb-item active">Home</li>
                    </ol>
                </nav>

                <div class="toolbar">
                    <button class="btn btn-custom" onclick="showUploadModal()">
                        <i class="bi bi-upload"></i>
                        <span>Upload</span>
                    </button>
                    <button class="btn btn-custom" onclick="showNewFolderModal()">
                        <i class="bi bi-folder-plus"></i>
                        <span>New Folder</span>
                    </button>
                    <button class="btn btn-custom" onclick="refreshFiles()">
                        <i class="bi bi-arrow-clockwise"></i>
                        <span>Refresh</span>
                    </button>
                </div>

                <div class="file-list" id="fileList">
                    <div class="empty-state">
                        <i class="bi bi-inbox"></i>
                        <p>No files or folders yet</p>
                        <small>Create a folder or upload a file to get started</small>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- New Folder Modal -->
    <div class="modal fade" id="newFolderModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title"><i class="bi bi-folder-plus"></i> Create New Folder</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div class="mb-3">
                        <label for="folderName" class="form-label">Folder Name</label>
                        <input type="text" class="form-control" id="folderName" placeholder="Enter folder name">
                    </div>
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" id="isPublic">
                        <label class="form-check-label" for="isPublic">
                            Make this folder public
                        </label>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-custom" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" class="btn btn-primary-custom" onclick="createFolder()">
                        <i class="bi bi-check"></i> Create
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Upload File Modal -->
    <div class="modal fade" id="uploadModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title"><i class="bi bi-upload"></i> Upload File</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div class="mb-3">
                        <label for="fileInput" class="form-label">Choose File</label>
                        <input type="file" class="form-control" id="fileInput">
                    </div>
                    <div id="uploadProgress" style="display:none;">
                        <div class="progress">
                            <div class="progress-bar" role="progressbar" style="width: 0%"></div>
                        </div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-custom" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" class="btn btn-primary-custom" onclick="uploadFile()">
                        <i class="bi bi-upload"></i> Upload
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        let currentFolderId = null;
        let folderStack = [];

        async function loadRootFolders() {
            try {
                const response = await fetch('/files/api/files/folders');
                const data = await response.json();
                displayFolders(data.folders, []);
                currentFolderId = null;
                folderStack = [];
                updateBreadcrumb([{name: 'Home', id: null}]);
            } catch (error) {
                console.error('Error loading folders:', error);
                alert('Failed to load folders');
            }
        }

        async function loadMyFiles() {
            loadRootFolders();
        }

        async function loadFolder(folderId, folderName) {
            try {
                const response = await fetch(`/files/api/files/folders/${folderId}/files`);
                const data = await response.json();
                
                currentFolderId = folderId;
                folderStack.push({id: folderId, name: folderName});
                
                displayFiles(data.files, data.folder);
                updateBreadcrumb([{name: 'Home', id: null}, ...folderStack]);
            } catch (error) {
                console.error('Error loading folder:', error);
                alert('Failed to load folder');
            }
        }

        function displayFolders(folders, files) {
            const fileList = document.getElementById('fileList');
            
            if (folders.length === 0 && files.length === 0) {
                fileList.innerHTML = `
                    <div class="empty-state">
                        <i class="bi bi-inbox"></i>
                        <p>No files or folders yet</p>
                        <small>Create a folder or upload a file to get started</small>
                    </div>
                `;
                return;
            }
            
            let html = '';
            
            folders.forEach(folder => {
                html += `
                    <div class="folder-item" onclick="loadFolder(${folder.id}, '${folder.name}')">
                        <i class="bi bi-folder folder-icon"></i>
                        <span class="folder-name">${folder.name}</span>
                        <span class="file-size">${folder.owner}</span>
                        ${folder.can_delete ? `<button class="btn btn-sm btn-custom" onclick="event.stopPropagation(); deleteFolder(${folder.id})"><i class="bi bi-trash"></i></button>` : ''}
                    </div>
                `;
            });
            
            files.forEach(file => {
                html += `
                    <div class="file-item">
                        <i class="bi bi-file-earmark file-icon"></i>
                        <span class="file-name">${file.name}</span>
                        <span class="file-size">${formatBytes(file.size)}</span>
                        <button class="btn btn-sm btn-custom" onclick="downloadFile(${file.id}, '${file.name}')">
                            <i class="bi bi-download"></i>
                        </button>
                        <button class="btn btn-sm btn-custom" onclick="deleteFile(${file.id})">
                            <i class="bi bi-trash"></i>
                        </button>
                    </div>
                `;
            });
            
            fileList.innerHTML = html;
        }

        function displayFiles(files, folder) {
            // Load subfolders first
            fetch(`/files/api/files/folders?parent_id=${folder.id}`)
                .then(res => res.json())
                .then(data => {
                    displayFolders(data.folders, files);
                });
        }

        function updateBreadcrumb(path) {
            const breadcrumb = document.getElementById('breadcrumb');
            let html = '';
            
            path.forEach((item, index) => {
                if (index === path.length - 1) {
                    html += `<li class="breadcrumb-item active">${item.name}</li>`;
                } else {
                    html += `<li class="breadcrumb-item"><a href="#" onclick="navigateTo(${index}); return false;">${item.name}</a></li>`;
                }
            });
            
            breadcrumb.innerHTML = html;
        }

        function navigateTo(index) {
            if (index === 0) {
                loadRootFolders();
            } else {
                const folder = folderStack[index - 1];
                folderStack = folderStack.slice(0, index);
                loadFolder(folder.id, folder.name);
            }
        }

        function showNewFolderModal() {
            if (currentFolderId === null) {
                // Can create root folders
            }
            const modal = new bootstrap.Modal(document.getElementById('newFolderModal'));
            modal.show();
        }

        function showUploadModal() {
            if (currentFolderId === null) {
                alert('Please select a folder first');
                return;
            }
            const modal = new bootstrap.Modal(document.getElementById('uploadModal'));
            modal.show();
        }

        async function createFolder() {
            const folderName = document.getElementById('folderName').value.trim();
            const isPublic = document.getElementById('isPublic').checked;
            
            if (!folderName) {
                alert('Please enter a folder name');
                return;
            }
            
            try {
                const params = new URLSearchParams({
                    name: folderName,
                    is_public: isPublic
                });
                
                if (currentFolderId !== null) {
                    params.append('parent_id', currentFolderId);
                }
                
                const response = await fetch(`/files/api/files/folders?${params}`, {
                    method: 'POST'
                });
                
                if (response.ok) {
                    bootstrap.Modal.getInstance(document.getElementById('newFolderModal')).hide();
                    document.getElementById('folderName').value = '';
                    refreshFiles();
                } else {
                    const error = await response.json();
                    alert(error.detail || 'Failed to create folder');
                }
            } catch (error) {
                console.error('Error creating folder:', error);
                alert('Failed to create folder');
            }
        }

        async function uploadFile() {
            const fileInput = document.getElementById('fileInput');
            const file = fileInput.files[0];
            
            if (!file) {
                alert('Please select a file');
                return;
            }
            
            if (currentFolderId === null) {
                alert('Please select a folder first');
                return;
            }
            
            const formData = new FormData();
            formData.append('file', file);
            
            try {
                const response = await fetch(`/files/api/files/folders/${currentFolderId}/upload`, {
                    method: 'POST',
                    body: formData
                });
                
                if (response.ok) {
                    bootstrap.Modal.getInstance(document.getElementById('uploadModal')).hide();
                    fileInput.value = '';
                    refreshFiles();
                } else {
                    const error = await response.json();
                    alert(error.detail || 'Failed to upload file');
                }
            } catch (error) {
                console.error('Error uploading file:', error);
                alert('Failed to upload file');
            }
        }

        async function downloadFile(fileId, fileName) {
            window.location.href = `/files/api/files/files/${fileId}/download`;
        }

        async function deleteFile(fileId) {
            if (!confirm('Are you sure you want to delete this file?')) {
                return;
            }
            
            try {
                const response = await fetch(`/files/api/files/files/${fileId}`, {
                    method: 'DELETE'
                });
                
                if (response.ok) {
                    refreshFiles();
                } else {
                    alert('Failed to delete file');
                }
            } catch (error) {
                console.error('Error deleting file:', error);
                alert('Failed to delete file');
            }
        }

        async function deleteFolder(folderId) {
            if (!confirm('Are you sure you want to delete this folder and all its contents?')) {
                return;
            }
            
            try {
                const response = await fetch(`/files/api/files/folders/${folderId}`, {
                    method: 'DELETE'
                });
                
                if (response.ok) {
                    refreshFiles();
                } else {
                    alert('Failed to delete folder');
                }
            } catch (error) {
                console.error('Error deleting folder:', error);
                alert('Failed to delete folder');
            }
        }

        function refreshFiles() {
            if (currentFolderId === null) {
                loadRootFolders();
            } else {
                const currentFolder = folderStack[folderStack.length - 1];
                loadFolder(currentFolder.id, currentFolder.name);
            }
        }

        function formatBytes(bytes) {
            if (bytes === 0) return '0 Bytes';
            const k = 1024;
            const sizes = ['Bytes', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return Math.round(bytes / Math.pow(k, i) * 100) / 100 + ' ' + sizes[i];
        }

        // Load root folders on page load
        document.addEventListener('DOMContentLoaded', () => {
            loadRootFolders();
        });
    </script>
</body>
</html>
