# SW Restaurant Management Portal - HTTP to HTTPS Redirect
# Domain: rm.swhgrp.com

server {
    listen 80;
    listen [::]:80;
    server_name rm.swhgrp.com;

    # Allow certbot to verify domain
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect all other HTTP traffic to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS Server
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name rm.swhgrp.com;

    # SSL Configuration
    ssl_certificate /etc/letsencrypt/live/rm.swhgrp.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/rm.swhgrp.com/privkey.pem;

    # SSL Security Settings
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:50m;
    ssl_session_tickets off;

    # Security headers
    add_header Strict-Transport-Security "max-age=63072000" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Logging
    access_log /var/log/nginx/rm.swhgrp.com.access.log;
    error_log /var/log/nginx/rm.swhgrp.com.error.log;

    # Application Modules (must come before generic / location)

    # Inventory Management Module
    location /inventory/ {
        proxy_pass http://inventory-app:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;

        # WebSocket support
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Accounting Module
    location /accounting/ {
        proxy_pass http://accounting-app:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;

        # WebSocket support
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        # Plaid Link requires encrypted-media permission and iframe support
        # Override X-Frame-Options to allow Plaid's iframe
        add_header X-Frame-Options "SAMEORIGIN";
        add_header Permissions-Policy "encrypted-media=(self https://cdn.plaid.com), payment=(self)";
    }

    # Accounting API
    location /api/accounting/ {
        proxy_pass http://accounting-app:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
    }

    # Integration Hub Module
    location /hub/ {
        proxy_pass http://integration-hub:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;

        # WebSocket support
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # HR Module
    location /hr/ {
        proxy_pass http://hr-app:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;

        # WebSocket support
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Events Module
    location /events/ {
        proxy_pass http://events-app:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;

        # WebSocket support (for FastAPI live reload in dev)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Maintenance & Equipment Tracking Module
    location /maintenance/ {
        proxy_pass http://maintenance-service:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;

        # WebSocket support
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Food Safety & Compliance Module
    location /food-safety/ {
        proxy_pass http://food-safety-service:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;

        # WebSocket support
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Cookbook AI Module
    location /cookbook/ {
        proxy_pass http://cookbook-app:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;

        # WebSocket support
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Timeouts (longer for AI queries)
        proxy_connect_timeout 120s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;

        # Allow large PDF uploads
        client_max_body_size 250m;
    }

    # Website Manager Module
    location /websites/ {
        proxy_pass http://websites-app:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;

        # WebSocket support
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        # Allow large image uploads
        client_max_body_size 20m;
    }

    # CalDAV auto-discovery for iOS and other clients
    location = /.well-known/caldav {
        return 301 $scheme://$host/caldav/;
    }

    # CalDAV endpoint for calendar sync
    location /caldav/ {
        # Pass through to CalDAV server (trailing slash strips /caldav prefix)
        # Radicale enforces owner_write permissions
        proxy_pass http://caldav:5232/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Extract username from HTTP Basic Auth if provided
        # $remote_user is automatically set by nginx from Authorization header
        proxy_set_header X-Remote-User $remote_user;

        # CalDAV-specific headers
        proxy_set_header Depth $http_depth;
        proxy_set_header Destination $http_destination;

        # Pass through Authorization header for CalDAV basic auth
        proxy_pass_header Authorization;

        # Disable buffering for CalDAV
        proxy_buffering off;
        proxy_request_buffering off;

        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # CalDAV user paths (must come before Files module and Portal catch-all)
    # These paths are accessed directly by CalDAV clients after discovery
    # Match any username path for CalDAV - uses negative lookahead to avoid conflicts
    # with other modules (inventory, accounting, hub, hr, events, maintenance, food-safety, websites, files, portal, onlyoffice)
    location ~ ^/(?!inventory|accounting|hub|hr|events|maintenance|food-safety|cookbook|websites|files|portal|onlyoffice|caldav|health|pos-demo|favicon|api)([a-z][a-z0-9_-]*)/ {
        # Proxy all CalDAV requests (PROPFIND, GET, PUT, DELETE, etc.)
        proxy_pass http://caldav:5232;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Remote-User $remote_user;

        # CalDAV-specific headers
        proxy_set_header Depth $http_depth;
        proxy_set_header Destination $http_destination;
        proxy_pass_header Authorization;

        # Disable buffering
        proxy_buffering off;
        proxy_request_buffering off;

        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # OnlyOffice Document Server
    location /onlyoffice/ {
        proxy_pass http://onlyoffice-documentserver/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host/onlyoffice;

        # Disable buffering for document editing
        proxy_buffering off;
        proxy_request_buffering off;

        # Increase timeouts for long editing sessions
        proxy_connect_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_read_timeout 3600s;

        # Allow large document uploads
        client_max_body_size 100m;
    }

    # Files Module
    # Files Module - WebDAV endpoint (must come before /files/ catch-all)
    location /files/webdav/ {
        proxy_pass http://files-app:8000/webdav/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Remote-User $remote_user;

        # WebDAV-specific headers
        proxy_set_header Depth $http_depth;
        proxy_set_header Destination $http_destination;
        proxy_set_header Overwrite $http_overwrite;
        proxy_pass_header Authorization;

        # Disable buffering for large file uploads
        proxy_buffering off;
        proxy_request_buffering off;

        # Increase timeouts for large file operations
        proxy_connect_timeout 300s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;

        # Increase max body size for large file uploads (10GB)
        client_max_body_size 10G;
    }

    # Files Module - Web UI
    location /files/ {
        proxy_pass http://files-app:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;

        # WebSocket support
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }




    # POS System Demo (via Portal)
    location /pos-demo {
        proxy_pass http://portal-app:8000/static/html/pos-demo.html;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Portal Module (Authentication)
    location /portal/ {
        proxy_pass http://portal-app:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Prefix /portal;
        proxy_redirect off;

        # Cookie support - make cookies available site-wide for SSO
        proxy_cookie_path / /;

        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Favicon - proxy to portal static files
    location = /favicon.ico {
        proxy_pass http://portal-app:8000/static/images/favicon.ico;
        proxy_set_header Host $host;
        access_log off;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location = /favicon-32.png {
        proxy_pass http://portal-app:8000/static/images/favicon-32.png;
        proxy_set_header Host $host;
        access_log off;
        expires 30d;
    }

    location = /favicon-16.png {
        proxy_pass http://portal-app:8000/static/images/favicon-16.png;
        proxy_set_header Host $host;
        access_log off;
        expires 30d;
    }

    # Health check endpoint
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    # Mobile configuration profiles for CalDAV setup
    location ~ \.mobileconfig$ {
        root /var/www/portal/html;
        add_header Content-Type application/x-apple-aspen-config;
    }

    # Root - Redirect to Portal
    location = / {
        return 301 https://$host/portal/;
    }

    location / {
        return 301 https://$host/portal/;
    }
}
